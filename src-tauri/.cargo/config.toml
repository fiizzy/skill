# ── Default build target ──────────────────────────────────────────────────────
#
# cargo's [build] section has no per-host-OS conditionals, so a hardcoded
# `target = "aarch64-apple-darwin"` here would break Windows / Linux builds
# ("can't find crate for `core`").
#
# Platform default is therefore left as the host triple.  Per-platform
# targeting is handled at two levels:
#
#   1. npm / Tauri builds (recommended):
#        npm run tauri:build          ← auto-selects target via scripts/tauri-build.js
#        macOS  → --target aarch64-apple-darwin
#        Windows/Linux → host triple (no --target flag)
#
#   2. Raw `cargo` on macOS:
#        Either pass --target aarch64-apple-darwin explicitly, or let direnv
#        source the repo-root .envrc which exports CARGO_BUILD_TARGET for you.
#
# ── Windows build prerequisite: LLVM / libclang ───────────────────────────────
#
# llama-cpp-sys uses bindgen to generate Rust↔C bindings at build time.
# bindgen requires libclang.dll, which ships with the LLVM toolchain.
#
# One-time setup (run once, then restart your terminal):
#
#   winget install LLVM.LLVM
#
#   # Then add to your user environment (PowerShell):
#   [System.Environment]::SetEnvironmentVariable(
#       "LIBCLANG_PATH", "C:\Program Files\LLVM\bin", "User")
#
# Without this, cargo build fails with:
#   "Unable to find libclang: couldn't find any valid shared libraries
#    matching: ['clang.dll', 'libclang.dll']"
#
# LIBCLANG_PATH is intentionally NOT set here because the path is
# installation-dependent and force=true would break machines where LLVM
# lives elsewhere.  Set it in your system/user environment variables instead.

[build]
# target intentionally omitted — defaults to the host triple

# ── espeak-ng static library ──────────────────────────────────────────────────
#
# These two env vars are injected into every build script in this workspace so
# that both skill/build.rs and kittentts/build.rs find the static archive and,
# if it is absent, know where to find the script that builds it.
#
# `relative = true` resolves paths relative to this file (src-tauri/).

[env]
ESPEAK_LIB_DIR    = { value = "espeak-static/lib",                    relative = true }
ESPEAK_BUILD_SCRIPT = { value = "../scripts/build-espeak-static.sh",  relative = true }
# ── macOS deployment target ───────────────────────────────────────────────────
#
# llama.cpp uses std::filesystem (fs::path / fs::u8path) which was introduced
# in macOS 10.15.  Xcode 26+ enforces availability annotations strictly, so
# building against an older deployment target produces hard errors like:
#   "'path' is unavailable: introduced in macOS 10.15"
#
# Two separate knobs are needed:
#
#   MACOSX_DEPLOYMENT_TARGET
#     Read by the `cc` crate to generate -mmacosx-version-min in
#     CMAKE_C_FLAGS / CMAKE_CXX_FLAGS (passed by cmake-0.1.57).
#
#   CMAKE_OSX_DEPLOYMENT_TARGET
#     llama-cpp-sys-2/build.rs forwards all CMAKE_* env vars directly to
#     cmake configure via config.define(key, value).  cmake then appends
#     its own -mmacosx-version-min=10.15 AFTER CMAKE_C_FLAGS, so Clang's
#     "last flag wins" rule overrides the 10.13 baked into CMAKE_C_FLAGS.
#
# force=true is required so that a system-level MACOSX_DEPLOYMENT_TARGET
# (e.g. set by Xcode to 10.13) cannot silently override these values.
#
# ⚠️  After changing either value you MUST delete the stale cmake cache:
#     rm -rf src-tauri/target/release/build/llama-cpp-sys-2-*/
# The cmake crate skips reconfiguration when CMakeCache.txt exists, so the old
# min-version flags stay baked in until the cache directory is removed.
MACOSX_DEPLOYMENT_TARGET    = { value = "10.15", force = true }
CMAKE_OSX_DEPLOYMENT_TARGET = { value = "10.15", force = true }
