name: Release — Windows

# Triggered by the same semver tag as the macOS and Linux release workflows.
# All three run in parallel; each uploads its own binaries and then merges
# its platform entry into the shared latest.json updater manifest.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'CI test only — build but skip release upload'
        type: boolean
        default: true

permissions:
  contents: write   # create/update GitHub Releases and upload assets

# Opt into Node.js 24 now — same rationale as ci.yml.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-windows:
    name: Build & Release — x86_64-pc-windows-msvc
    runs-on: windows-latest
    environment: ${{ inputs.dry_run && 'CI-Test' || 'Release' }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Windows app manifest
        shell: bash
        run: node scripts/check-windows-manifest.mjs src-tauri/manifest.xml

      # ── Resolve version ─────────────────────────────────────────────────────
      # Tag push: verify tag matches tauri.conf.json.
      # workflow_dispatch: read version from tauri.conf.json directly.
      - name: Resolve version
        id: version_meta
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF:        ${{ github.ref }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
          DRY_RUN:           ${{ inputs.dry_run || 'false' }}
        run: node scripts/ci.mjs resolve-version

      # ── MSVC developer environment ────────────────────────────────────────────
      # Puts cl.exe, link.exe, lib.exe, and signtool.exe in PATH.
      # Required for the espeak-ng static library build (lib.exe) and for
      # Tauri's Windows code-signing step (signtool.exe).
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Validate Windows app manifest with mt.exe
        shell: powershell
        run: |
          $mt = Get-Command mt.exe -ErrorAction SilentlyContinue
          if (-not $mt) {
            Write-Error "mt.exe not found in PATH"
            exit 1
          }
          & $mt.Source -nologo -manifest src-tauri/manifest.xml -validate_manifest
          if ($LASTEXITCODE -ne 0) {
            Write-Error "mt.exe manifest validation failed"
            exit $LASTEXITCODE
          }
          Write-Host "[ok] mt.exe manifest validation passed"

      # ── Remove Git's link.exe and tar.exe ────────────────────────────────────
      # Git for Windows prepends C:\Program Files\Git\usr\bin to PATH at every
      # step via $GITHUB_PATH (re-applied each step, so runtime PATH changes
      # don't survive — only direct file deletion works).  Two binaries cause
      # problems:
      #
      #   link.exe — Unix hard-link utility; shadows MSVC's linker, producing
      #              "extra operand" build errors.
      #   tar.exe  — GNU tar used by actions/cache with --posix, which strips
      #              or corrupts non-POSIX Windows paths in the saved archive,
      #              breaking cache restores.  Deleting it forces the use of
      #              C:\Windows\System32\tar.exe (built-in bsdtar 3.x).
      - name: Remove Git's link.exe and tar.exe (shadow MSVC linker / corrupt cache)
        shell: powershell
        run: |
          foreach ($bin in @("link.exe", "tar.exe")) {
            $path = "C:\Program Files\Git\usr\bin\$bin"
            if (Test-Path $path) {
              Remove-Item $path -Force
              Write-Host "[ok] Deleted $path"
            } else {
              Write-Host "[skip] $path not found"
            }
          }

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── Cargo cache ───────────────────────────────────────────────────────────
      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> src-tauri/target"
          shared-key: windows-release-x86_64-msvc-v2
          # Save cache even when the job fails (e.g. a post-build step
          # errors out).  Without this, a late-stage failure means the
          # 57-min compile output is discarded and the next run starts
          # from scratch — a vicious cycle.
          save-if: "always()"
          # Don't cache final compiled artifacts — registry + incremental
          # data is enough; target/ artifacts recompile quickly from it.
          cache-targets: false
          cache-on-failure: false

      # ── ONNX Runtime (official binaries) ───────────────────────────────────
      # Use the official Microsoft release archive instead of relying on
      # ort-sys CDN downloads. This makes Windows release builds deterministic
      # and ensures onnxruntime.dll is available for packaging.
      - name: Cache ONNX Runtime (Windows x64)
        uses: actions/cache@v5
        with:
          path: ${{ env.USERPROFILE }}\.cache\onnxruntime
          key: windows-onnxruntime-1.23.2-x64

      - name: Install ONNX Runtime (Windows x64) + export ORT env
        shell: powershell
        run: |
          $OrtVersion = "1.23.2"
          $OrtBase = Join-Path $env:USERPROFILE ".cache\onnxruntime"
          $OrtRoot = Join-Path $OrtBase ("onnxruntime-win-x64-" + $OrtVersion)
          $OrtDll = Join-Path $OrtRoot "lib\onnxruntime.dll"
          $OrtLib = Join-Path $OrtRoot "lib\onnxruntime.lib"

          if (-not ((Test-Path $OrtDll) -and (Test-Path $OrtLib))) {
            New-Item -ItemType Directory -Force -Path $OrtBase | Out-Null
            $ZipPath = Join-Path $env:RUNNER_TEMP "onnxruntime-win-x64.zip"
            $Url = "https://github.com/microsoft/onnxruntime/releases/download/v$OrtVersion/onnxruntime-win-x64-$OrtVersion.zip"

            $ok = $false
            for ($i = 1; $i -le 8; $i++) {
              try {
                Invoke-WebRequest -Uri $Url -OutFile $ZipPath
                $ok = $true
                break
              } catch {
                if ($i -eq 8) { throw }
                Start-Sleep -Seconds 2
              }
            }
            if (-not $ok) {
              Write-Error "Failed to download ONNX Runtime after retries"
              exit 1
            }

            Remove-Item -Recurse -Force $OrtRoot -ErrorAction SilentlyContinue
            Expand-Archive -Path $ZipPath -DestinationPath $OrtBase -Force
          }

          if (-not ((Test-Path $OrtDll) -and (Test-Path $OrtLib))) {
            Write-Error "ONNX Runtime files missing: $OrtDll / $OrtLib"
            exit 1
          }

          "ORT_LIB_LOCATION=$OrtRoot\lib" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ORT_PREFER_DYNAMIC_LINK=1" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PATH=$OrtRoot\lib;$OrtRoot\bin;$env:PATH" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "[ok] ORT_LIB_LOCATION=$OrtRoot\lib"

      # ── Build cache (sccache) ─────────────────────────────────────────────────
      - name: Setup sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Configure sccache for GitHub Actions cache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=10G" >> "$GITHUB_ENV"
          # Version the sccache GHA cache so it can be busted manually by
          # incrementing this value (e.g. after a toolchain or LLVM upgrade).
          echo "SCCACHE_GHA_VERSION=2" >> "$GITHUB_ENV"

          # Verify sccache is working
          sccache --show-stats
          echo "[ok] RUSTC_WRAPPER=${RUSTC_WRAPPER:-<not set>}"

      # ── Node.js + frontend build ─────────────────────────────────────────────
      # Moved before SDK installs so the frontend compiles while heavy SDKs
      # (Vulkan, LLVM, espeak) are set up afterwards — no dependency between
      # the two.  On cache-warm runs the frontend finishes in < 30 s, so the
      # wall-clock saving comes from not blocking the SDK steps behind it.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install protoc (Windows)
        run: node scripts/ci.mjs install-protoc-windows


      - name: Build frontend
        run: npm run build

      - name: Verify Tauri frontend bundle structure
        run: npm run -s verify:tauri:frontend

      # ── NSIS + Vulkan SDK (parallel install) ─────────────────────────────────
      # NSIS and the Vulkan SDK are independent of each other and of the Rust
      # toolchain.  Installing them in a single step via background jobs cuts
      # ~1-2 min of sequential wait time on cache-miss runs.
      - name: Cache Vulkan SDK
        uses: actions/cache@v5
        with:
          path: C:\VulkanSDK
          # Bump the suffix when upgrading the Vulkan SDK version, since the
          # install script downloads "latest" and the cache would serve stale files.
          key: windows-vulkan-sdk-v1-${{ hashFiles('scripts/install-vulkan-sdk.ps1') }}

      - name: Cache NSIS
        uses: actions/cache@v5
        with:
          path: |
            C:\Program Files (x86)\NSIS
            C:\nsis
          key: windows-nsis-v1

      - name: Install NSIS + Vulkan SDK (parallel)
        shell: powershell
        run: |
          # ── NSIS (background) ────────────────────────────────────────────────
          $nsisJob = Start-Job -ScriptBlock {
            $makensis = Get-Command makensis -ErrorAction SilentlyContinue
            if ($makensis) {
              Write-Output "[ok] NSIS already on PATH: $($makensis.Source)"
              return
            }

            # Try Chocolatey first, fall back to direct download
            $installed = $false
            for ($i = 1; $i -le 2; $i++) {
              try {
                Write-Output "[info] NSIS not found; installing via Chocolatey (attempt $i)"
                choco install nsis -y --no-progress 2>&1
                if ($LASTEXITCODE -eq 0) { $installed = $true; break }
              } catch {
                Write-Output "[warn] choco attempt $i failed: $($_.Exception.Message)"
              }
              Start-Sleep -Seconds (3 * $i)
            }

            if (-not $installed) {
              Write-Output "[warn] Chocolatey unavailable; falling back to direct NSIS download"
              $nsisVer = "3.10"
              $url = "https://sourceforge.net/projects/nsis/files/NSIS%203/$nsisVer/nsis-$nsisVer.zip/download"
              $zip = Join-Path $env:TEMP "nsis-$nsisVer.zip"
              $dest = "C:\nsis"
              Invoke-WebRequest -Uri $url -OutFile $zip -UserAgent "Mozilla/5.0" -MaximumRedirection 10
              Expand-Archive -Path $zip -DestinationPath $dest -Force
              # The zip extracts into a subdirectory
              $innerDir = Get-ChildItem -Path $dest -Directory | Select-Object -First 1
              if ($innerDir) {
                # Move contents up so makensis.exe is at C:\nsis\makensis.exe
                Get-ChildItem -Path $innerDir.FullName | Move-Item -Destination $dest -Force
                Remove-Item $innerDir.FullName -Recurse -Force -ErrorAction SilentlyContinue
              }
              if (-not (Test-Path (Join-Path $dest "makensis.exe"))) {
                throw "NSIS direct download failed: makensis.exe not found in $dest"
              }
              Write-Output "[ok] Installed NSIS $nsisVer via direct download to $dest"
            }
          }

          # ── Vulkan SDK (foreground — needs env export) ───────────────────────
          & .\scripts\install-vulkan-sdk.ps1
          if (-not $env:VULKAN_SDK) {
            Write-Error "VULKAN_SDK was not set by install-vulkan-sdk.ps1"
            exit 1
          }
          "VULKAN_SDK=$env:VULKAN_SDK" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[ok] Exported VULKAN_SDK=$env:VULKAN_SDK"

          # ── Wait for NSIS ────────────────────────────────────────────────────
          $nsisJob | Wait-Job | Receive-Job
          if ($nsisJob.State -eq 'Failed') {
            Write-Error "NSIS background install failed"
            exit 1
          }

          # Locate makensis and export NSIS_DIR
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensis) {
            $nsisDir = Split-Path -Parent $makensis.Source
          } else {
            $candidatePaths = @(
              "C:\Program Files (x86)\NSIS",
              "C:\Program Files\NSIS",
              "$env:LOCALAPPDATA\NSIS",
              "C:\nsis"
            )
            $nsisDir = $null
            foreach ($path in $candidatePaths) {
              if (Test-Path (Join-Path $path "makensis.exe")) {
                $nsisDir = $path
                break
              }
            }
          }

          if (-not $nsisDir -or -not (Test-Path (Join-Path $nsisDir "makensis.exe"))) {
            Write-Error "NSIS installation succeeded but makensis.exe is still not discoverable"
            exit 1
          }

          "NSIS_DIR=$nsisDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $nsisDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "[ok] NSIS_DIR=$nsisDir"

      - name: Download prebuilt llama libs (Windows, optional)
        shell: bash
        run: node scripts/ci.mjs download-llama windows x86_64-pc-windows-msvc vulkan

      # ── Ensure VC++ Redistributable DLLs are available ───────────────────────
      # The binary uses dynamic CRT (/MD).  The NSIS installer bundles the CRT
      # DLLs app-locally alongside skill.exe.  This step ensures they exist on
      # the runner — either via the VS installation or by downloading the
      # official VC++ Redistributable from Microsoft.
      - name: Ensure VC++ CRT DLLs available
        id: vcredist
        shell: powershell
        run: |
          & (Join-Path $env:GITHUB_WORKSPACE "scripts/ensure-vcredist.ps1")

          # Export for subsequent steps
          if (-not $env:CRT_REDIST_DIR) {
            Write-Error "ensure-vcredist.ps1 did not set CRT_REDIST_DIR"
            exit 1
          }

      # ── Pre-flight: verify every required secret is set ──────────────────────
      # Fails fast (before the 15-min build) if any secret is missing.
      # Values are never printed.
      #
      # WINDOWS_CERTIFICATE          — base64-encoded .pfx code-signing certificate
      #                                (OV or EV cert from DigiCert, Sectigo, etc.)
      #                                How to encode:
      #                                  certutil -encode cert.pfx cert.b64
      #                                  — or on PowerShell:
      #                                  [Convert]::ToBase64String([IO.File]::ReadAllBytes("cert.pfx"))
      #
      # WINDOWS_CERTIFICATE_PASSWORD — password protecting the .pfx
      #                                Optional — if omitted the installer is built
      #                                unsigned (SmartScreen will warn on first run).
      #
      # TAURI_SIGNING_PRIVATE_KEY    — Ed25519 private key for signing Tauri
      #                                updater artifacts (same key as macOS/Linux)
      - name: Verify signing secrets are present
        if: steps.version_meta.outputs.dry_run != 'true'
        id: signing_meta
        shell: bash
        env:
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY:    ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          # TAURI_SIGNING_PRIVATE_KEY is always required (updater artifact signing).
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Secret 'TAURI_SIGNING_PRIVATE_KEY' is empty or not set."
            exit 1
          fi
          echo "[ok] TAURI_SIGNING_PRIVATE_KEY is present."

          # Windows code-signing certificate is optional.
          # Both variables must be set together or both must be absent.
          HAVE_CERT=false
          if [ -n "$WINDOWS_CERTIFICATE" ] && [ -n "$WINDOWS_CERTIFICATE_PASSWORD" ]; then
            HAVE_CERT=true
          elif [ -n "$WINDOWS_CERTIFICATE" ] || [ -n "$WINDOWS_CERTIFICATE_PASSWORD" ]; then
            echo "::error::WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD" \
                 "must both be set or both be absent."
            exit 1
          fi

          if [ "$HAVE_CERT" = "true" ]; then
            echo "[ok] Windows code-signing certificate is present - installer will be signed."
          else
            echo "::warning::WINDOWS_CERTIFICATE is not set." \
                 "The NSIS installer will be built unsigned." \
                 "Windows SmartScreen may show a warning to end-users."
          fi

          # Expose for later steps.
          echo "have_windows_cert=$HAVE_CERT" >> "$GITHUB_OUTPUT"
          echo "HAVE_WINDOWS_CERT=$HAVE_CERT" >> "$GITHUB_ENV"

      # ── espeak-ng MSVC static library ─────────────────────────────────────────
      # Cache keyed on the build script; a script change busts the cache.
      # The PS1 script requires MSVC tools (lib.exe) — set up above via
      # ilammy/msvc-dev-cmd before this step runs.
      # ── Import Windows code-signing certificate (optional) ───────────────────
      # Skipped when WINDOWS_CERTIFICATE is not set (unsigned build).
      # When present: imports the .pfx into the Current User certificate store,
      # captures the SHA-1 thumbprint, and exposes it as CERTIFICATE_THUMBPRINT
      # for the build step.  The temp .pfx file is deleted immediately after import.
      #
      # SmartScreen note: an OV (Organisation Validated) certificate will still
      # trigger SmartScreen warnings on first run until the binary accumulates
      # reputation.  An EV (Extended Validation) certificate skips this entirely.
      - name: Import Windows code-signing certificate
        if: steps.version_meta.outputs.dry_run != 'true' && steps.signing_meta.outputs.have_windows_cert == 'true'
        shell: powershell
        env:
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD `
                        -AsPlainText -Force
          $cert = Import-PfxCertificate `
                    -FilePath          $certPath `
                    -CertStoreLocation Cert:\CurrentUser\My `
                    -Password          $password

          Remove-Item $certPath -Force

          $thumbprint = $cert.Thumbprint
          "CERTIFICATE_THUMBPRINT=$thumbprint" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $expiry = $cert.NotAfter.ToString("yyyy-MM-dd")
          Write-Host "[ok] Certificate imported"
          Write-Host "  Thumbprint : $thumbprint"
          Write-Host "  Subject    : $($cert.Subject)"
          Write-Host "  Expires    : $expiry"

          if ($cert.NotAfter -lt (Get-Date)) {
            Write-Error "::error::Code-signing certificate has expired ($expiry). Renew it."
            exit 1
          }

      # ── Standalone LLVM 19 for bindgen + lld-link ─────────────────────────────
      # VS2022's bundled clang-cl can't handle __builtin_ia32_* intrinsics in
      # mmintrin.h, causing bindgen (llama-cpp-sys-4) to fail.  Standalone
      # LLVM 19 fixes this and also provides lld-link for faster linking.
      #
      # Cache the full install so subsequent runs skip the ~500 MB download.
      - name: Cache LLVM 19
        id: llvm-cache
        uses: actions/cache@v5
        with:
          path: C:\LLVM
          key: windows-llvm-19-v1

      - name: Install LLVM 19
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "19"
          directory: C:\LLVM

      - name: Export LLVM env vars
        shell: powershell
        run: |
          $bin = "C:\LLVM\bin"
          if (-not (Test-Path "$bin\libclang.dll")) {
            # bin/ may be nested one level deeper
            $dll = Get-ChildItem "C:\LLVM" -Recurse -Filter "libclang.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $dll) { Write-Error "libclang.dll not found under C:\LLVM"; exit 1 }
            $bin = Split-Path $dll.FullName
          }

          @(
            "LIBCLANG_PATH=$bin",
            "LLVM_CONFIG=$bin\llvm-config.exe",
            "CC=$bin\clang.exe",
            "CXX=$bin\clang++.exe"
          ) | ForEach-Object {
            $_ | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "[ok] $_"
          }

          # Use lld-link for faster linking if available
          $lldLink = Join-Path $bin "lld-link.exe"
          if (Test-Path $lldLink) {
            "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$lldLink" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "[ok] CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$lldLink"
          } else {
            Write-Host "[info] lld-link not found; falling back to MSVC link.exe"
          }

      # ── Compile Rust (cargo build only) ──────────────────────────────────────
      #
      # Split from packaging so CI timing shows compile vs NSIS separately.
      #
      # --features custom-protocol: required — without it Tauri compiles in
      #   dev mode and loads UI from localhost:1420 instead of the embedded
      #   SvelteKit build output.
      # --features llm-vulkan: enables Vulkan GPU offloading for LLM inference
      #   (covers NVIDIA, AMD, Intel Arc without vendor-specific SDKs).
      - name: Compile (Rust)
        shell: bash
        env:
          VULKAN_SDK:        ${{ env.VULKAN_SDK }}
          LIBCLANG_PATH:     ${{ env.LIBCLANG_PATH }}
          # RUSTC_WRAPPER is set automatically by sccache-action.
          SCCACHE_GHA_ENABLED: "true"
          SCCACHE_CACHE_SIZE:  "10G"
          # Dynamic CRT: native deps (DirectML, ONNX Runtime, Vulkan loader)
          # ship as pre-built /MD DLLs.  Using /MD everywhere avoids CRT
          # mismatch.  The NSIS installer bundles the VC++ Redist DLLs
          # app-locally so end users don't need a separate install.
          CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreadedDLL
          # Let sccache cache C/C++ compilations from cmake-based -sys crates
          # (llama-cpp-sys-4, espeak-ng, etc.).  Without these, only rustc
          # invocations go through sccache — the heavy cmake builds are
          # re-done from scratch every time.
          CMAKE_C_COMPILER_LAUNCHER:   sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          set -euo pipefail

          # Diagnostic: verify sccache is reachable by cargo
          echo "[diag] RUSTC_WRAPPER=${RUSTC_WRAPPER:-<not set>}"
          if [ -n "${RUSTC_WRAPPER:-}" ]; then
            "$RUSTC_WRAPPER" --version || echo "[warn] RUSTC_WRAPPER binary not executable"
          fi
          sccache --show-stats || true

          # Build both packages in a single cargo invocation so feature
          # unification happens once and shared dependencies compile only once.
          run_cmd() {
            cargo build -p skill-daemon -p skill --release --locked --target x86_64-pc-windows-msvc --features custom-protocol --timings
          }

          if ! run_cmd; then
            if [[ -n "${LLAMA_PREBUILT_DIR:-}" ]]; then
              echo "::warning::Windows release compile failed with prebuilt llama; retrying with source build"
              unset LLAMA_PREBUILT_DIR LLAMA_PREBUILT_SHARED
              find src-tauri/target -name "*llama_cpp_sys*" -exec rm -rf {} + 2>/dev/null || true
              find src-tauri/target -name "*llama-cpp-sys*" -exec rm -rf {} + 2>/dev/null || true
              run_cmd
            else
              exit 1
            fi
          fi

          sccache --show-stats || true

      # Make sure NSIS packaging can always find onnxruntime.dll next to the
      # built binary, independent of Cargo OUT_DIR layout details.
      - name: Stage onnxruntime.dll for packaging
        shell: powershell
        run: |
          if (-not $env:ORT_LIB_LOCATION) {
            Write-Error "ORT_LIB_LOCATION is not set"
            exit 1
          }

          $Dll = Join-Path $env:ORT_LIB_LOCATION "onnxruntime.dll"
          if (-not (Test-Path $Dll)) {
            Write-Error "onnxruntime.dll not found at $Dll"
            exit 1
          }

          $releaseDirs = @(
            "src-tauri/target/release",
            "src-tauri/target/x86_64-pc-windows-msvc/release"
          )

          foreach ($dir in $releaseDirs) {
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
            Copy-Item $Dll (Join-Path $dir "onnxruntime.dll") -Force
            Write-Host "[ok] Copied onnxruntime.dll to $dir"
          }

      # ── Upload cargo build timings ───────────────────────────────────────────
      # The --timings flag produces an HTML report showing per-crate compile
      # durations.  Upload it so slow crates can be identified and targeted.
      - name: Upload cargo build timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-timings-windows
          path: src-tauri/target/cargo-timings/
          retention-days: 30

      # ── Log binary dependencies (diagnostic) ──────────────────────────────
      # CRT DLLs were already located in the "Ensure VC++ CRT DLLs available"
      # step before the build.  This step just logs the dependency list.
      - name: Log binary dependencies
        shell: powershell
        run: |
          $exeCandidates = @(
            "src-tauri/target/x86_64-pc-windows-msvc/release/skill.exe",
            "src-tauri/target/release/skill.exe"
          )
          
          $exe = $null
          foreach ($candidate in $exeCandidates) {
            if (Test-Path $candidate) {
              $exe = $candidate
              break
            }
          }
          
          if (-not $exe) {
            Write-Error "skill.exe not found. Checked: $(($exeCandidates -join ', '))"
            exit 1
          }

          Write-Host "Binary dependencies:"
          & dumpbin /dependents $exe

          Write-Host ""
          Write-Host "CRT DLLs will be bundled from: $env:CRT_REDIST_DIR"

      # ── Package NSIS installer ───────────────────────────────────────────────
      #
      # Runs the NSIS packaging script against the pre-built binary, then
      # optionally signs the installer and creates updater artifacts.
      - name: Package NSIS installer
        shell: powershell
        run: |
          & powershell -ExecutionPolicy Bypass -File scripts/create-windows-nsis.ps1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[error] create-windows-nsis.ps1 failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          $bundleDirCandidates = @(
            (Join-Path $PWD "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"),
            (Join-Path $PWD "src-tauri/target/release/bundle/nsis")
          )

          $bundleDir = $null
          $installer = $null
          foreach ($candidate in $bundleDirCandidates) {
            if (-not (Test-Path $candidate)) { continue }
            $candidateInstaller = Get-ChildItem -Path $candidate -File -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch "(?i)uninstall" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if ($candidateInstaller) {
              $bundleDir = $candidate
              $installer = $candidateInstaller
              break
            }
          }

          if (-not $installer) {
            Write-Host "[error] NSIS installer .exe not found in expected bundle directories"
            foreach ($candidate in $bundleDirCandidates) {
              if (Test-Path $candidate) {
                Write-Host "[diag] bundle dir snapshot: $candidate"
                Get-ChildItem -Path $candidate -File -ErrorAction SilentlyContinue |
                  Select-Object Name, Length |
                  Format-Table -AutoSize |
                  Out-String |
                  Write-Host
              } else {
                Write-Host "[diag] bundle dir not found: $candidate"
              }
            }
            exit 1
          }

          Write-Host "[ok] NSIS installer built: $($installer.FullName) ($([math]::Round($installer.Length / 1MB, 1)) MB)"

      # ── Sign installer + create updater artifacts ────────────────────────────
      # Skipped in dry-run mode (no signing secrets available).
      - name: Sign installer + create updater artifacts
        if: steps.version_meta.outputs.dry_run != 'true'
        shell: powershell
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $bundleDirCandidates = @(
            (Join-Path $PWD "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"),
            (Join-Path $PWD "src-tauri/target/release/bundle/nsis")
          )

          $bundleDir = $null
          $installer = $null
          foreach ($candidate in $bundleDirCandidates) {
            if (-not (Test-Path $candidate)) { continue }
            $candidateInstaller = Get-ChildItem -Path $candidate -File -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch "(?i)uninstall" } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
            if ($candidateInstaller) {
              $bundleDir = $candidate
              $installer = $candidateInstaller
              break
            }
          }

          if ($env:CERTIFICATE_THUMBPRINT) {
            Write-Host "[ok] signing installer: $($installer.FullName)"
            & signtool sign `
              /sha1 $env:CERTIFICATE_THUMBPRINT `
              /fd sha256 `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /v `
              $installer.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "[error] signtool failed while signing installer"
              exit $LASTEXITCODE
            }
          } else {
            Write-Host "[warn] CERTIFICATE_THUMBPRINT is not set; installer remains unsigned"
          }

          $zipPath = Join-Path $bundleDir ("$($installer.BaseName).nsis.zip")
          $sigPath = "$zipPath.sig"

          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          if (Test-Path $sigPath) { Remove-Item $sigPath -Force }

          # Use Deflate (CompressionLevel.Optimal) for the updater zip.
          # zip 4.6.1 now has flate2 + deflate64 enabled via the workspace
          # dependency in Cargo.toml, so both method 8 (Deflate) and method
          # 9 (Deflate64) are supported by tauri-plugin-updater at extract time.
          Add-Type -AssemblyName System.IO.Compression
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open(
            $zipPath,
            [System.IO.Compression.ZipArchiveMode]::Create
          )
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
            $zip,
            $installer.FullName,
            $installer.Name,
            [System.IO.Compression.CompressionLevel]::Optimal
          ) | Out-Null
          $zip.Dispose()
          Write-Host "[ok] created updater zip (Deflate): $zipPath"

          & npx tauri signer sign $zipPath
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[error] tauri signer failed for updater zip"
            exit $LASTEXITCODE
          }

          if (-not (Test-Path $sigPath)) {
            Write-Host "[error] expected updater signature not found: $sigPath"
            exit 1
          }

          Write-Host "[ok] updater artifacts created (.nsis.zip + .sig)"

      # ── Locate build artifacts ────────────────────────────────────────────────
      - name: Collect artifact paths
        if: steps.version_meta.outputs.dry_run != 'true'
        id: artifacts
        shell: bash
        run: |
          CANDIDATES=(
            "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
            "src-tauri/target/release/bundle/nsis"
          )

          BUNDLE_DIR=""
          NSIS_EXE=""
          NSIS_ZIP=""
          NSIS_SIG=""

          for candidate in "${CANDIDATES[@]}"; do
            [ -d "$candidate" ] || continue

            candidate_exe="$(find "$candidate" -maxdepth 1 -name "*.exe" ! -iname "*uninstall*" | head -1)"
            candidate_zip="$(find "$candidate" -maxdepth 1 -name "*.nsis.zip" ! -name "*.sig" | head -1)"
            candidate_sig="$(find "$candidate" -maxdepth 1 -name "*.nsis.zip.sig" | head -1)"

            if [ -n "$candidate_exe" ] && [ -n "$candidate_zip" ] && [ -n "$candidate_sig" ]; then
              BUNDLE_DIR="$candidate"
              NSIS_EXE="$candidate_exe"
              NSIS_ZIP="$candidate_zip"
              NSIS_SIG="$candidate_sig"
              break
            fi
          done

          if [ -z "$NSIS_EXE" ] || [ -z "$NSIS_ZIP" ] || [ -z "$NSIS_SIG" ]; then
            echo "::error::One or more expected artifacts are missing."
            for candidate in "${CANDIDATES[@]}"; do
              if [ -d "$candidate" ]; then
                echo "[diag] listing $candidate"
                find "$candidate" -maxdepth 1 -type f | sort || true
              else
                echo "[diag] bundle dir not found: $candidate"
              fi
            done
            echo "  EXE : ${NSIS_EXE:-(not found)}"
            echo "  ZIP : ${NSIS_ZIP:-(not found)}"
            echo "  SIG : ${NSIS_SIG:-(not found)}"
            exit 1
          fi

          echo "nsis_exe=$NSIS_EXE"                          >> "$GITHUB_OUTPUT"
          echo "nsis_zip=$NSIS_ZIP"                          >> "$GITHUB_OUTPUT"
          echo "nsis_sig=$NSIS_SIG"                          >> "$GITHUB_OUTPUT"
          echo "nsis_zip_name=$(basename "$NSIS_ZIP")"       >> "$GITHUB_OUTPUT"

          echo "Artifacts found:"
          echo "  EXE : $NSIS_EXE  ($(du -sh "$NSIS_EXE" | cut -f1))"
          echo "  ZIP : $NSIS_ZIP  ($(du -sh "$NSIS_ZIP" | cut -f1))"
          echo "  SIG : $NSIS_SIG"

      # ── Create / update GitHub Release with Windows binaries ─────────────────
      #
      # softprops/action-gh-release creates the release if it doesn't exist yet,
      # or adds files to it if it was already created by the macOS or Linux
      # workflow.  latest.json is handled in the next step.
      #
      # Windows assets uploaded here:
      #   *_x64-setup.exe          — NSIS installer (distribute to users)
      #   *.nsis.zip               — Tauri updater bundle
      #   *.nsis.zip.sig           — Ed25519 signature for the updater
      - name: Prepare changelog notes for release
        if: steps.version_meta.outputs.dry_run != 'true'
        shell: bash
        run: |
          TAG="${{ steps.version_meta.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          RANGE="${PREV_TAG:+$PREV_TAG..}$TAG"
          node scripts/ci.mjs prepare-changelog \
            "${{ steps.version_meta.outputs.version }}" release-notes.md "$RANGE"

      - name: Create / update GitHub Release
        if: steps.version_meta.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:                ${{ steps.version_meta.outputs.tag }}
          name:                    Skill v${{ steps.version_meta.outputs.version }}
          generate_release_notes:  false
          body_path:               release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.nsis_exe }}
            ${{ steps.artifacts.outputs.nsis_zip }}
            ${{ steps.artifacts.outputs.nsis_sig }}

      # ── Update latest.json ────────────────────────────────────────────────────
      #
      # Downloads the current latest.json from the release (created by whichever
      # platform workflow ran first), merges the windows-x86_64 entry, then
      # re-uploads.  If no latest.json exists yet, creates one from scratch.
      - name: Update latest.json
        if: steps.version_meta.outputs.dry_run != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/ci.mjs update-latest-json
          --platform windows-x86_64
          --url "https://github.com/${{ github.repository }}/releases/download/${{ steps.version_meta.outputs.tag }}/${{ steps.artifacts.outputs.nsis_zip_name }}"
          --sig-file "${{ steps.artifacts.outputs.nsis_sig }}"
          --tag "${{ steps.version_meta.outputs.tag }}"
          --version "${{ steps.version_meta.outputs.version }}"
          --upload

      # ── Upload CI artifacts (on-demand / dry-run builds only) ────────────────
      - name: Upload build artifacts
        if: steps.version_meta.outputs.is_release != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: NeuroSkill-Windows-${{ steps.version_meta.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.nsis_exe }}
            ${{ steps.artifacts.outputs.nsis_zip }}
          retention-days: 14

      # ── Remove the certificate from the runner's cert store ──────────────────
      - name: Remove signing certificate
        if: always() && steps.version_meta.outputs.dry_run != 'true' && steps.signing_meta.outputs.have_windows_cert == 'true'
        shell: powershell
        run: |
          if ($env:CERTIFICATE_THUMBPRINT) {
            Get-ChildItem Cert:\CurrentUser\My\$env:CERTIFICATE_THUMBPRINT `
              -ErrorAction SilentlyContinue |
              Remove-Item -Force
            Write-Host "[ok] Certificate removed from store."
          }

      # ── Discord notification ──────────────────────────────────────────────────
      - name: Notify Discord of release
        if: always() && steps.version_meta.outputs.dry_run != 'true'
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: >-
          node scripts/ci.mjs discord-notify
          --status  "${{ job.status }}"
          --title   "${{ job.status == 'success' && '🚀' || '💥' }} NeuroSkill™ v${{ steps.version_meta.outputs.version }} — Windows ${{ job.status == 'success' && 'Published' || 'Failed' }}"
          --version "${{ steps.version_meta.outputs.version }}"
          --tag     "${{ steps.version_meta.outputs.tag }}"
          --platform "Windows x86_64"
          --release-url "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version_meta.outputs.tag }}"
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
