name: Release — Linux

# Triggered by the same semver tag as the macOS and Windows release workflows.
# All three run in parallel; each uploads its own binaries and then merges
# its platform entry into the shared latest.json updater manifest.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write   # create/update GitHub Releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-linux:
    name: Build & Release — x86_64-unknown-linux-gnu
    runs-on: ubuntu-24.04
    environment: Release

    steps:
      # ── Free pre-installed software we don't use (~10 GB reclaimed) ──────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /usr/local/share/powershell /usr/local/share/chromium /usr/share/swift \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af 2>/dev/null || true
          df -h /

      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for git tag --format and changelog generation

      # ── Verify tag matches tauri.conf.json version ────────────────────────────
      - name: Resolve version
        id: version_meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF:        ${{ github.ref }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
        run: node scripts/ci.mjs resolve-version

      # ── Vulkan SDK repo ─────────────────────────────────────────────────────
      # Add the LunarG apt repository BEFORE the cached apt install step so
      # that vulkan-sdk is resolvable by apt in the cache-apt-pkgs-action.
      - name: Setup Vulkan SDK repository
        uses: ./.github/actions/setup-vulkan-linux

      # ── System dependencies ───────────────────────────────────────────────────
      # Linux compile + system package flow requires WebKit2GTK and supporting
      # libraries for tauri/wry compilation. vulkan-sdk is included here so
      # all apt packages are cached in a single cache-apt-pkgs-action call.
      - name: Cache + install system dependencies (incl. mold + clang + Vulkan)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf
            libssl-dev
            libudev-dev
            libdbus-1-dev
            pkg-config
            libasound2-dev
            libpipewire-0.3-dev
            libgbm-dev
            cmake
            binutils
            rpm
            mold
            clang
            protobuf-compiler
            libopenblas-dev
            vulkan-sdk
          version: tauri-release-linux-v7

      # ── Rust toolchain + build cache bootstrap ───────────────────────────────
      - name: Setup Rust bootstrap (Linux)
        uses: ./.github/actions/setup-rust-bootstrap-linux
        with:
          targets: x86_64-unknown-linux-gnu

      # ── Cargo cache ───────────────────────────────────────────────────────────
      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> src-tauri/target"
          shared-key: linux-release-x86_64-unknown-linux-gnu-v1
          cache-targets: false
          cache-on-failure: false

      # ── ONNX Runtime binary cache ──────────────────────────────────────────
      # ort-sys downloads ~200 MB static libs from cdn.pyke.io during build.
      # Cache them so the download only happens once (avoids CDN flakiness).
      - name: Cache ONNX Runtime binaries (ort-sys)
        uses: actions/cache@v5
        with:
          path: ~/.cache/ort.pyke.io
          key: linux-ort-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-ort-


      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      # ── Pre-flight: verify every required secret is set ──────────────────────
      # Linux builds don't need platform code-signing credentials (there is no
      # Linux equivalent of Apple notarization or Windows Authenticode), but the
      # shared Tauri Ed25519 updater signing key is still required.
      - name: Verify signing secrets are present
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/ci.mjs verify-secrets TAURI_SIGNING_PRIVATE_KEY

      - name: Download prebuilt llama libs (Linux, optional)
        shell: bash
        run: node scripts/ci.mjs download-llama linux x86_64-unknown-linux-gnu vulkan

      # ── espeak-ng static library ──────────────────────────────────────────────
      # ── Build frontend ────────────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build

      - name: Verify Tauri frontend bundle structure
        run: npm run -s verify:tauri:frontend

      # ── Clean cached outputs that can mask stale release artifacts ──────────
      # rust-cache restores target/dist directories between runs. If a previous
      # job left bundle outputs behind, later fallback checks can accidentally
      # pick stale artifacts.
      - name: Clean stale Linux release outputs
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ROOT="src-tauri/target/x86_64-unknown-linux-gnu/release"
          rm -rf "$TARGET_ROOT/bundle"
          rm -f "$TARGET_ROOT/skill"
          rm -rf "dist/linux/x86_64-unknown-linux-gnu"
          echo "✓ Cleared stale target/dist outputs before Linux release build"

      # ── Compile (frontend + Rust + daemon) ───────────────────────────────
      - name: Compile (frontend + Rust + daemon)
        env:
          RUSTC_WRAPPER: sccache
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
          CMAKE_C_COMPILER_LAUNCHER:   sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        shell: bash
        run: |
          set -euo pipefail
          # Build both in one invocation for consistent feature unification
          run_cmd() {
            # Build daemon first — its default features compile llama-cpp-sys-4
            # with mtmd+vulkan+q1 via skill-llm's target-specific deps.
            cargo build -p skill-daemon --release --locked --target x86_64-unknown-linux-gnu --timings
            cargo build -p skill --release --locked --target x86_64-unknown-linux-gnu --features custom-protocol --timings
          }
          if ! run_cmd; then
            if [[ -n "${LLAMA_PREBUILT_DIR:-}" ]]; then
              echo "::warning::Linux release compile failed with prebuilt llama; retrying with source build"
              unset LLAMA_PREBUILT_DIR LLAMA_PREBUILT_SHARED
              find src-tauri/target -name "*llama_cpp_sys*" -exec rm -rf {} + 2>/dev/null || true
              find src-tauri/target -name "*llama-cpp-sys*" -exec rm -rf {} + 2>/dev/null || true
              run_cmd
            else
              exit 1
            fi
          fi

      # ── Stage files for packaging ─────────────────────────────────────---
      # The daemon binary sits next to the app binary.  At runtime the
      # Tauri app starts the daemon and calls its /service/install endpoint
      # which self-registers a systemd --user service.  No system-level
      # service file is needed in the package.
      - name: Stage files for packaging
        shell: bash
        run: |
          set -euo pipefail
          PKGROOT="$RUNNER_TEMP/pkgroot"
          mkdir -p "$PKGROOT/opt/NeuroSkill"

          # Copy Tauri app binary
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/skill "$PKGROOT/opt/NeuroSkill/skill"
          chmod +x "$PKGROOT/opt/NeuroSkill/skill"

          # Copy daemon binary next to the app binary
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/skill-daemon "$PKGROOT/opt/NeuroSkill/skill-daemon"
          chmod +x "$PKGROOT/opt/NeuroSkill/skill-daemon"

          # Verify both binaries are present
          ls -la "$PKGROOT/opt/NeuroSkill/skill" "$PKGROOT/opt/NeuroSkill/skill-daemon"

          # Show staged files
          find "$PKGROOT"

      # ── Build Linux portable tarball with daemon and service ─────────────
      - name: Build Linux portable tarball (with daemon)
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/pkgroot"
          tar -czf "$GITHUB_WORKSPACE/NeuroSkill-linux-x86_64.tar.gz" .

      # ── Upload cargo build timings ─────────────────────────────────────────
      # The --timings flag produces an HTML report showing per-crate compile
      # durations.  Upload it so slow crates can be identified and targeted.
      - name: Upload cargo build timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-timings-linux
          path: src-tauri/target/cargo-timings/
          retention-days: 30

      - name: Build Linux deb/rpm via system tools
        run: bash scripts/package-linux-system-bundles.sh --target x86_64-unknown-linux-gnu --skip-build

      - name: Build Linux portable tarball
        run: bash scripts/package-linux-dist.sh --target x86_64-unknown-linux-gnu --skip-build

      # ── Post-build sanity check ─────────────────────────────────────────────
      - name: Verify Linux bundle directories
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          PORTABLE_DIR="dist/linux/x86_64-unknown-linux-gnu"
          PORTABLE_TAR_COUNT="$(find "$PORTABLE_DIR" -maxdepth 1 -name "*.tar.gz" | wc -l | tr -d ' ')"

          if [ ! -d "$TARGET_DIR/deb" ] || [ ! -d "$TARGET_DIR/rpm" ] || [ "$PORTABLE_TAR_COUNT" -eq 0 ]; then
            echo "::error::Expected Linux bundle directories are missing."
            echo "Expected: $TARGET_DIR/deb, $TARGET_DIR/rpm, and at least one tar.gz in $PORTABLE_DIR"
            echo "Present under $TARGET_DIR and $PORTABLE_DIR:"
            find "$TARGET_DIR" -maxdepth 2 -type d 2>/dev/null | sort || true
            find "$PORTABLE_DIR" -maxdepth 2 2>/dev/null | sort || true
            exit 1
          fi

          echo "✓ Artifacts exist: $TARGET_DIR/deb, $TARGET_DIR/rpm, $PORTABLE_DIR/*.tar.gz"

      # ── Locate build artifacts ────────────────────────────────────────────────
      - name: Collect artifact paths
        id: artifacts
        run: |
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          PORTABLE_DIR="dist/linux/x86_64-unknown-linux-gnu"

          DEB="$(find "$TARGET_DIR/deb"      -maxdepth 1 -name "*.deb"               | head -1)"
          RPM="$(find "$TARGET_DIR/rpm"      -maxdepth 1 -name "*.rpm"               | head -1)"
          TAR="$(find "$PORTABLE_DIR" -maxdepth 1 -name "*.tar.gz" | head -1)"

          if [ -z "$DEB" ] || [ -z "$RPM" ] || [ -z "$TAR" ]; then
            echo "::error::One or more expected artifacts are missing."
            echo "  DEB : ${DEB:-(not found)}"
            echo "  RPM : ${RPM:-(not found)}"
            echo "  TAR : ${TAR:-(not found)}"
            exit 1
          fi

          echo "deb=$DEB"                         >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM"                         >> "$GITHUB_OUTPUT"
          echo "portable_tar=$TAR"               >> "$GITHUB_OUTPUT"
          echo "portable_tar_name=$(basename "$TAR")" >> "$GITHUB_OUTPUT"

          echo "Artifacts found:"
          echo "  DEB : $DEB  ($(du -sh "$DEB" | cut -f1))"
          echo "  RPM : $RPM  ($(du -sh "$RPM" | cut -f1))"
          echo "  TAR : $TAR  ($(du -sh "$TAR" | cut -f1))"

      - name: Write Linux release health metrics
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-metrics

          DEB="${{ steps.artifacts.outputs.deb }}"
          RPM="${{ steps.artifacts.outputs.rpm }}"
          TAR="${{ steps.artifacts.outputs.portable_tar }}"
          BIN="src-tauri/target/x86_64-unknown-linux-gnu/release/skill"

          DEB_BYTES="$(stat -c %s "$DEB")"
          RPM_BYTES="$(stat -c %s "$RPM")"
          TAR_BYTES="$(stat -c %s "$TAR")"
          BIN_BYTES="$(stat -c %s "$BIN")"

          {
            echo '{'
            echo '  "job": "release-linux",'
            echo '  "target": "x86_64-unknown-linux-gnu",'
            echo '  "binary_bytes":' "$BIN_BYTES" ','
            echo '  "deb_bytes":' "$DEB_BYTES" ','
            echo '  "rpm_bytes":' "$RPM_BYTES" ','
            echo '  "portable_tar_bytes":' "$TAR_BYTES"
            echo '}'
          } > ci-metrics/release-linux.json

          {
            echo "## Linux release health metrics"
            echo "- skill binary size: ${BIN_BYTES} bytes"
            echo "- .deb size: ${DEB_BYTES} bytes"
            echo "- .rpm size: ${RPM_BYTES} bytes"
            echo "- portable tarball size: ${TAR_BYTES} bytes"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Linux release health metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-health-release-linux
          path: ci-metrics/release-linux.json
          retention-days: 30

      - name: Generate checksums + detached signatures
        id: integrity
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          CHECKSUMS="$TARGET_DIR/SHA256SUMS-linux-x86_64.txt"

          sha256sum \
            "${{ steps.artifacts.outputs.deb }}" \
            "${{ steps.artifacts.outputs.rpm }}" \
            "${{ steps.artifacts.outputs.portable_tar }}" \
            > "$CHECKSUMS"

          npx tauri signer sign "${{ steps.artifacts.outputs.deb }}"
          npx tauri signer sign "${{ steps.artifacts.outputs.rpm }}"
          npx tauri signer sign "${{ steps.artifacts.outputs.portable_tar }}"

          echo "checksums=$CHECKSUMS" >> "$GITHUB_OUTPUT"
          echo "deb_sig=${{ steps.artifacts.outputs.deb }}.sig" >> "$GITHUB_OUTPUT"
          echo "rpm_sig=${{ steps.artifacts.outputs.rpm }}.sig" >> "$GITHUB_OUTPUT"
          echo "portable_tar_sig=${{ steps.artifacts.outputs.portable_tar }}.sig" >> "$GITHUB_OUTPUT"

          echo "Integrity artifacts:"
          echo "  SHA256SUMS : $CHECKSUMS"
          echo "  DEB SIG    : ${{ steps.artifacts.outputs.deb }}.sig"
          echo "  RPM SIG    : ${{ steps.artifacts.outputs.rpm }}.sig"
          echo "  TAR SIG    : ${{ steps.artifacts.outputs.portable_tar }}.sig"

      # ── Create / update GitHub Release with Linux binaries ───────────────────
      #
      # softprops/action-gh-release creates the release if it doesn't exist yet,
      # or adds files to it if it was already created by the macOS or Windows
      # workflow.  latest.json is handled in the next step.
      #
      # Linux assets uploaded here:
      #   *.deb                  — Debian/Ubuntu package
      #   *.rpm                  — Fedora/RHEL/openSUSE package
      #   *linux-portable.tar.gz — standalone Linux portable package
      #   SHA256SUMS-linux-x86_64.txt — checksums for Linux artifacts
      #   *.deb.sig / *.rpm.sig / *.tar.gz.sig — detached signatures
      - name: Prepare changelog notes for release
        if: steps.version_meta.outputs.is_release == 'true'
        run: |
          TAG="${{ steps.version_meta.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          RANGE="${PREV_TAG:+$PREV_TAG..}$TAG"
          node scripts/ci.mjs prepare-changelog \
            "${{ steps.version_meta.outputs.version }}" release-notes.md "$RANGE"

      - name: Create / update GitHub Release
        if: steps.version_meta.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name:                ${{ steps.version_meta.outputs.tag }}
          name:                    Skill v${{ steps.version_meta.outputs.version }}
          generate_release_notes:  false
          body_path:               release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.rpm }}
            ${{ steps.artifacts.outputs.portable_tar }}
            ${{ steps.integrity.outputs.checksums }}
            ${{ steps.integrity.outputs.deb_sig }}
            ${{ steps.integrity.outputs.rpm_sig }}
            ${{ steps.integrity.outputs.portable_tar_sig }}

      # ── Update latest.json ────────────────────────────────────────────────────
      #
      # Downloads the current latest.json from the release (created by whichever
      # platform workflow ran first), merges the linux-x86_64 entry, then
      # re-uploads.  If no latest.json exists yet, creates one from scratch.
      - name: Update latest.json
        if: steps.version_meta.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/ci.mjs update-latest-json
          --platform linux-x86_64
          --url "https://github.com/${{ github.repository }}/releases/download/${{ steps.version_meta.outputs.tag }}/${{ steps.artifacts.outputs.portable_tar_name }}"
          --sig-file "${{ steps.integrity.outputs.portable_tar_sig }}"
          --tag "${{ steps.version_meta.outputs.tag }}"
          --version "${{ steps.version_meta.outputs.version }}"
          --upload

      # ── Upload CI artifacts (on-demand builds only) ──────────────────────────
      - name: Upload build artifacts
        if: steps.version_meta.outputs.is_release != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: NeuroSkill-Linux-${{ steps.version_meta.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.rpm }}
            ${{ steps.artifacts.outputs.portable_tar }}
          retention-days: 14

      # ── Discord notification ──────────────────────────────────────────────────
      - name: Notify Discord of release
        if: always() && steps.version_meta.outputs.is_release == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: >-
          node scripts/ci.mjs discord-notify
          --status  "${{ job.status }}"
          --title   "${{ job.status == 'success' && '🚀' || '💥' }} NeuroSkill™ v${{ steps.version_meta.outputs.version }} — Linux ${{ job.status == 'success' && 'Published' || 'Failed' }}"
          --version "${{ steps.version_meta.outputs.version }}"
          --tag     "${{ steps.version_meta.outputs.tag }}"
          --platform "Linux x86_64"
          --release-url "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version_meta.outputs.tag }}"
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
