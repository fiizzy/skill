name: Release — Linux

# Triggered by the same semver tag as the macOS and Windows release workflows.
# All three run in parallel; each uploads its own binaries and then merges
# its platform entry into the shared latest.json updater manifest.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # create/update GitHub Releases and upload assets

jobs:
  release-linux:
    name: Build & Release — x86_64-unknown-linux-gnu
    runs-on: ubuntu-24.04
    environment: Release

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Verify tag matches tauri.conf.json version ────────────────────────────
      - name: Verify version matches tag
        id: version_meta
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          CONF_VERSION=$(
            grep '"version"' src-tauri/tauri.conf.json \
            | head -1 \
            | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/'
          )
          if [ "$VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match" \
                 "tauri.conf.json version ($CONF_VERSION)."
            echo "::error::Bump the version in src-tauri/tauri.conf.json and" \
                 "src-tauri/Cargo.toml, then re-tag."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG"         >> "$GITHUB_ENV"
          echo "✓ Version verified: $VERSION"

      # ── System dependencies ───────────────────────────────────────────────────
      # Linux compile + system package flow requires WebKit2GTK and supporting
      # libraries for tauri/wry compilation. We intentionally do not run Tauri
      # bundling in this workflow.
      - name: Cache + install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libappindicator3-dev
            librsvg2-dev
            patchelf
            libssl-dev
            libudev-dev
            libdbus-1-dev
            pkg-config
            libasound2-dev
            libpipewire-0.3-dev
            cmake
            binutils
            rpm
          version: tauri-release-linux-v2

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      # ── Cargo cache ───────────────────────────────────────────────────────────
      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> src-tauri/target"

      # ── Build cache (sccache + mold) ──────────────────────────────────────────
      - name: Setup sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Install mold + clang
        run: sudo apt-get update -qq && sudo apt-get install -y mold clang

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      # ── Pre-flight: verify every required secret is set ──────────────────────
      # Linux builds don't need platform code-signing credentials (there is no
      # Linux equivalent of Apple notarization or Windows Authenticode), but the
      # shared Tauri Ed25519 updater signing key is still required.
      - name: Verify signing secrets are present
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Secret 'TAURI_SIGNING_PRIVATE_KEY' is empty or not set."
            exit 1
          fi
          echo "✓ TAURI_SIGNING_PRIVATE_KEY is present."

      # ── Vulkan SDK ────────────────────────────────────────────────────────────
      # Required by the llm-vulkan feature (llama.cpp Vulkan GPU backend).
      # Installed from the LunarG apt repository.
      - name: Install Vulkan SDK
        run: bash scripts/install-vulkan-sdk.sh

      # ── espeak-ng static library ──────────────────────────────────────────────
      # Cache keyed on the build script; a script change busts the cache.
      - name: Cache espeak-ng static lib
        id: cache-espeak
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/espeak-static
            src-tauri/resources/espeak-ng-data
          key: linux-x86_64-espeak-${{ hashFiles('scripts/build-espeak-static.sh') }}

      - name: Build espeak-ng static lib
        if: steps.cache-espeak.outputs.cache-hit != 'true'
        run: ESPEAK_ARCHS=x86_64 bash scripts/build-espeak-static.sh

      # ── Build frontend ────────────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build

      - name: Verify Tauri frontend bundle structure
        run: npm run -s verify:tauri:frontend

      # ── Clean cached outputs that can mask stale release artifacts ──────────
      # rust-cache restores target/dist directories between runs. If a previous
      # job left bundle outputs behind, later fallback checks can accidentally
      # pick stale artifacts.
      - name: Clean stale Linux release outputs
        shell: bash
        run: |
          set -euo pipefail
          TARGET_ROOT="src-tauri/target/x86_64-unknown-linux-gnu/release"
          rm -rf "$TARGET_ROOT/bundle"
          rm -f "$TARGET_ROOT/skill"
          rm -rf "dist/linux/x86_64-unknown-linux-gnu"
          echo "✓ Cleared stale target/dist outputs before Linux release build"

      # ── Compile only (frontend + Rust) ───────────────────────────────────────
      #
      # Like macOS, Linux release avoids Tauri bundling and performs packaging
      # with repository scripts after compile-only output is produced.
      #
      # --features custom-protocol: required — without it Tauri compiles in
      #   dev mode and loads UI from localhost:1420 instead of the embedded
      #   SvelteKit build output.
      # --features llm-vulkan: enables Vulkan GPU offloading for LLM inference
      #   (covers NVIDIA, AMD, Intel Arc without vendor-specific SDKs).
      - name: Compile (frontend + Rust)
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
          RUSTC_WRAPPER: sccache
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: -C link-arg=-fuse-ld=mold
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p skill --release --target x86_64-unknown-linux-gnu --features custom-protocol,llm-vulkan

      - name: Build Linux deb/rpm via system tools
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
        run: bash scripts/package-linux-system-bundles.sh --target x86_64-unknown-linux-gnu --skip-build

      - name: Build Linux portable tarball
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
        run: bash scripts/package-linux-dist.sh --target x86_64-unknown-linux-gnu --skip-build

      # ── Post-build sanity check ─────────────────────────────────────────────
      - name: Verify Linux bundle directories
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          PORTABLE_DIR="dist/linux/x86_64-unknown-linux-gnu"
          PORTABLE_TAR_COUNT="$(find "$PORTABLE_DIR" -maxdepth 1 -name "*.tar.gz" | wc -l | tr -d ' ')"

          if [ ! -d "$TARGET_DIR/deb" ] || [ ! -d "$TARGET_DIR/rpm" ] || [ "$PORTABLE_TAR_COUNT" -eq 0 ]; then
            echo "::error::Expected Linux bundle directories are missing."
            echo "Expected: $TARGET_DIR/deb, $TARGET_DIR/rpm, and at least one tar.gz in $PORTABLE_DIR"
            echo "Present under $TARGET_DIR and $PORTABLE_DIR:"
            find "$TARGET_DIR" -maxdepth 2 -type d 2>/dev/null | sort || true
            find "$PORTABLE_DIR" -maxdepth 2 2>/dev/null | sort || true
            exit 1
          fi

          echo "✓ Artifacts exist: $TARGET_DIR/deb, $TARGET_DIR/rpm, $PORTABLE_DIR/*.tar.gz"

      # ── Locate build artifacts ────────────────────────────────────────────────
      - name: Collect artifact paths
        id: artifacts
        run: |
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          PORTABLE_DIR="dist/linux/x86_64-unknown-linux-gnu"

          DEB="$(find "$TARGET_DIR/deb"      -maxdepth 1 -name "*.deb"               | head -1)"
          RPM="$(find "$TARGET_DIR/rpm"      -maxdepth 1 -name "*.rpm"               | head -1)"
          TAR="$(find "$PORTABLE_DIR" -maxdepth 1 -name "*.tar.gz" | head -1)"

          if [ -z "$DEB" ] || [ -z "$RPM" ] || [ -z "$TAR" ]; then
            echo "::error::One or more expected artifacts are missing."
            echo "  DEB : ${DEB:-(not found)}"
            echo "  RPM : ${RPM:-(not found)}"
            echo "  TAR : ${TAR:-(not found)}"
            exit 1
          fi

          echo "deb=$DEB"                         >> "$GITHUB_OUTPUT"
          echo "rpm=$RPM"                         >> "$GITHUB_OUTPUT"
          echo "portable_tar=$TAR"               >> "$GITHUB_OUTPUT"
          echo "portable_tar_name=$(basename "$TAR")" >> "$GITHUB_OUTPUT"

          echo "Artifacts found:"
          echo "  DEB : $DEB  ($(du -sh "$DEB" | cut -f1))"
          echo "  RPM : $RPM  ($(du -sh "$RPM" | cut -f1))"
          echo "  TAR : $TAR  ($(du -sh "$TAR" | cut -f1))"

      - name: Generate checksums + detached signatures
        id: integrity
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          CHECKSUMS="$TARGET_DIR/SHA256SUMS-linux-x86_64.txt"

          sha256sum \
            "${{ steps.artifacts.outputs.deb }}" \
            "${{ steps.artifacts.outputs.rpm }}" \
            "${{ steps.artifacts.outputs.portable_tar }}" \
            > "$CHECKSUMS"

          npx tauri signer sign "${{ steps.artifacts.outputs.deb }}"
          npx tauri signer sign "${{ steps.artifacts.outputs.rpm }}"
          npx tauri signer sign "${{ steps.artifacts.outputs.portable_tar }}"

          echo "checksums=$CHECKSUMS" >> "$GITHUB_OUTPUT"
          echo "deb_sig=${{ steps.artifacts.outputs.deb }}.sig" >> "$GITHUB_OUTPUT"
          echo "rpm_sig=${{ steps.artifacts.outputs.rpm }}.sig" >> "$GITHUB_OUTPUT"
          echo "portable_tar_sig=${{ steps.artifacts.outputs.portable_tar }}.sig" >> "$GITHUB_OUTPUT"

          echo "Integrity artifacts:"
          echo "  SHA256SUMS : $CHECKSUMS"
          echo "  DEB SIG    : ${{ steps.artifacts.outputs.deb }}.sig"
          echo "  RPM SIG    : ${{ steps.artifacts.outputs.rpm }}.sig"
          echo "  TAR SIG    : ${{ steps.artifacts.outputs.portable_tar }}.sig"

      # ── Create / update GitHub Release with Linux binaries ───────────────────
      #
      # softprops/action-gh-release creates the release if it doesn't exist yet,
      # or adds files to it if it was already created by the macOS or Windows
      # workflow.  latest.json is handled in the next step.
      #
      # Linux assets uploaded here:
      #   *.deb                  — Debian/Ubuntu package
      #   *.rpm                  — Fedora/RHEL/openSUSE package
      #   *linux-portable.tar.gz — standalone Linux portable package
      #   SHA256SUMS-linux-x86_64.txt — checksums for Linux artifacts
      #   *.deb.sig / *.rpm.sig / *.tar.gz.sig — detached signatures
      - name: Prepare changelog notes for release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version_meta.outputs.version }}"
          CURRENT_TAG="${{ steps.version_meta.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"
          COMMIT_RANGE="$CURRENT_TAG"
          if [ -n "$PREV_TAG" ]; then
            COMMIT_RANGE="$PREV_TAG..$CURRENT_TAG"
          fi

          TMP_SECTION="release-changelog-section.md"
          CONTRIBUTORS_FILE="release-contributors.md"
          RELEASE_BODY="release-notes.md"

          awk -v version="$VERSION" '
            BEGIN { in_section = 0; found = 0 }
            $0 ~ ("^## \\[" version "\\]") { in_section = 1; found = 1; next }
            in_section && $0 ~ /^## \[/ { exit }
            in_section { print }
            END { if (!found) exit 2 }
          ' CHANGELOG.md > "$TMP_SECTION" || true

          git log --format='%aN' $COMMIT_RANGE \
            | awk '
                { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0) }
                NF && !seen[$0]++ { print "- " $0 }
              ' > "$CONTRIBUTORS_FILE"

          {
            echo "## Changelog"
            echo
            if [ -s "$TMP_SECTION" ]; then
              cat "$TMP_SECTION"
            else
              echo "_No changelog section found for version $VERSION in CHANGELOG.md._"
            fi
            echo
            echo "## Contributors"
            echo
            if [ -s "$CONTRIBUTORS_FILE" ]; then
              cat "$CONTRIBUTORS_FILE"
            else
              echo "_No commit contributors found in range $COMMIT_RANGE._"
            fi
          } > "$RELEASE_BODY"

          rm -f "$TMP_SECTION" "$CONTRIBUTORS_FILE"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:                ${{ steps.version_meta.outputs.tag }}
          name:                    Skill v${{ steps.version_meta.outputs.version }}
          generate_release_notes:  false
          body_path:               release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.artifacts.outputs.rpm }}
            ${{ steps.artifacts.outputs.portable_tar }}
            ${{ steps.integrity.outputs.checksums }}
            ${{ steps.integrity.outputs.deb_sig }}
            ${{ steps.integrity.outputs.rpm_sig }}
            ${{ steps.integrity.outputs.portable_tar_sig }}

      # ── Update latest.json ────────────────────────────────────────────────────
      #
      # Downloads the current latest.json from the release (created by whichever
      # platform workflow ran first), merges the linux-x86_64 entry, then
      # re-uploads.  If no latest.json exists yet, creates one from scratch.
      - name: Update latest.json
        env:
          GH_TOKEN:          ${{ github.token }}
          GH_REPO:           ${{ github.repository }}
          TAG:               ${{ steps.version_meta.outputs.tag }}
          VERSION:           ${{ steps.version_meta.outputs.version }}
          PORTABLE_TAR_NAME: ${{ steps.artifacts.outputs.portable_tar_name }}
          PORTABLE_SIG_PATH: ${{ steps.integrity.outputs.portable_tar_sig }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, datetime

          version      = os.environ["VERSION"]
          tag          = os.environ["TAG"]
          repo         = os.environ["GH_REPO"]
          tar_name     = os.environ["PORTABLE_TAR_NAME"]
          sig_path     = os.environ["PORTABLE_SIG_PATH"]

          with open(sig_path) as fh:
              signature = fh.read().strip()

          download_url = (
              f"https://github.com/{repo}/releases/download/{tag}/{tar_name}"
          )

          # Try to download the existing latest.json from the release.
          dl = subprocess.run(
              ["gh", "release", "download", tag,
               "--pattern", "latest.json", "--output", "latest.json", "--clobber"],
              capture_output=True, text=True,
          )

          if dl.returncode == 0:
              with open("latest.json", encoding="utf-8-sig") as fh:
                  manifest = json.load(fh)
          else:
              pub_date = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
              manifest = {
                  "version":  version,
                  "notes":    f"NeuroSkill\u2122 v{version}",
                  "pub_date": pub_date,
                  "platforms": {},
              }

          manifest["platforms"]["linux-x86_64"] = {
              "url":       download_url,
              "signature": signature,
          }

          with open("latest.json", "w", encoding="utf-8") as fh:
              json.dump(manifest, fh, indent=2, ensure_ascii=False)
              fh.write("\n")

          print("Updated latest.json:")
          print(json.dumps(manifest, indent=2))
          PYEOF

          gh release upload "$TAG" latest.json --clobber
          echo "✓ latest.json uploaded to release $TAG"

      # ── Discord notification ──────────────────────────────────────────────────
      - name: Notify Discord of release
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS:          ${{ job.status }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' | head -c 200)
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version_meta.outputs.tag }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$JOB_STATUS" == "success" ]]; then
            COLOR=3066993
            TITLE="🚀 NeuroSkill™ Release v${{ steps.version_meta.outputs.version }} — Linux Published"
            DESC="NeuroSkill™ Linux build published and ready to download."
            LINK_LINE="**[Download v${{ steps.version_meta.outputs.version }}]($RELEASE_URL)**"
          else
            COLOR=15158332
            TITLE="💥 NeuroSkill™ Release v${{ steps.version_meta.outputs.version }} — Linux Failed"
            DESC="The NeuroSkill™ Linux release build failed. Check the run for details."
            LINK_LINE="**[View failed run]($RUN_URL)**"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\n\n$LINK_LINE\",
                \"url\": \"$RUN_URL\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Tag\",      \"value\": \"\`${{ steps.version_meta.outputs.tag }}\`\",     \"inline\": true},
                  {\"name\": \"Version\",  \"value\": \"\`${{ steps.version_meta.outputs.version }}\`\", \"inline\": true},
                  {\"name\": \"Platform\", \"value\": \"Linux x86_64\",            \"inline\": true},
                  {\"name\": \"Actor\",    \"value\": \"${{ github.actor }}\",     \"inline\": true},
                  {\"name\": \"Commit Message\", \"value\": $(echo "$COMMIT_MSG" | jq -Rs .), \"inline\": false}
                ],
                \"footer\": {\"text\": \"${{ github.repository }}\"}
              }]
            }"
