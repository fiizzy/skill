name: Release - Mac

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release — aarch64-apple-darwin
    runs-on: macos-26
    environment: Release

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so git tag --format can read the annotation

      # ── Verify tag matches tauri.conf.json version ────────────────────────────
      # Catches "forgot to bump the version" before wasting 20 min on a build.
      - name: Verify version matches tag
        id: version_meta
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"   # strip leading 'v'  →  1.2.3
          CONF_VERSION=$(
            grep '"version"' src-tauri/tauri.conf.json \
            | head -1 \
            | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/'
          )
          if [ "$VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match" \
                 "tauri.conf.json version ($CONF_VERSION)."
            echo "::error::Bump the version in src-tauri/tauri.conf.json and" \
                 "src-tauri/Cargo.toml, then re-tag."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG"         >> "$GITHUB_ENV"
          echo "✓ Version verified: $VERSION"

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # ── Cargo cache ───────────────────────────────────────────────────────────
      # Swatinem/rust-cache is purpose-built for Rust: it strips test artifacts,
      # stale deps, and other bloat before saving, keeping the cache lean.
      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> src-tauri/target"
          cache-targets: false
          cache-on-failure: false

      # ── Build cache (sccache) ─────────────────────────────────────────────────
      - name: Setup sccache
        uses: Mozilla-Actions/sccache-action@v0.0.9

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install protoc + OpenMP runtime + GNU ar (macOS)
        run: |
          brew install protobuf libomp binutils
          # Use GNU ar to suppress "illegal option -- D" warnings from Apple's system ar
          echo "AR=$(brew --prefix binutils)/bin/gar" >> "$GITHUB_ENV"

      - name: Download prebuilt llama libs (macOS, optional)
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/eugenehp/llama-cpp-rs/releases/latest/download/llama-prebuilt-macos-aarch64-apple-darwin-q1-metal.tar.gz"
          ARCHIVE="$RUNNER_TEMP/llama-prebuilt-macos.tar.gz"
          DEST="$RUNNER_TEMP/llama-prebuilt-macos"
          EXPECTED_TARGET="aarch64-apple-darwin"
          EXPECTED_FEATURE="metal"
          mkdir -p "$DEST"

          if ! curl -fL "$URL" -o "$ARCHIVE"; then
            echo "[warn] prebuilt llama artifact unavailable; fallback to source build"
            exit 0
          fi

          tar -xzf "$ARCHIVE" -C "$DEST"
          ROOT="$DEST"
          if [[ ! -d "$ROOT/lib" && ! -d "$ROOT/lib64" && ! -d "$ROOT/bin" ]]; then
            ROOT="$(find "$DEST" -mindepth 1 -maxdepth 1 -type d | head -n1 || true)"
          fi

          if [[ -z "${ROOT:-}" ]]; then
            echo "[warn] prebuilt llama archive layout invalid; fallback to source build"
            exit 0
          fi

          if ! find "$ROOT" -type f \( -name '*.a' -o -name '*.dylib' \) | head -n1 >/dev/null; then
            echo "[warn] prebuilt llama archive contains no static/shared libs; fallback to source build"
            exit 0
          fi

          if [[ -f "$ROOT/metadata.json" ]]; then
            TARGET="$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1])).get("target",""))' "$ROOT/metadata.json")"
            FEATURES="$(python3 -c 'import json,sys;print(json.load(open(sys.argv[1])).get("features",""))' "$ROOT/metadata.json")"
            if [[ "$TARGET" != "$EXPECTED_TARGET" || "$FEATURES" != *"$EXPECTED_FEATURE"* ]]; then
              echo "[warn] prebuilt metadata mismatch (target=$TARGET features=$FEATURES); fallback to source build"
              exit 0
            fi
          fi

          echo "LLAMA_PREBUILT_DIR=$ROOT" >> "$GITHUB_ENV"
          echo "LLAMA_PREBUILT_SHARED=0" >> "$GITHUB_ENV"
          echo "[ok] LLAMA_PREBUILT_DIR=$ROOT"

      # ── Pre-flight: verify every secret is set ───────────────────────────────
      # Catches missing / renamed secrets in seconds instead of after a 15-minute
      # build.  Each variable is checked for non-empty; none of the values are
      # printed.
      - name: Verify signing and notarization secrets are present
        env:
          APPLE_CERTIFICATE:             ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:    ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:        ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                      ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                 ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY:     ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          ok=true
          for var in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY
          do
            if [ -z "${!var}" ]; then
              echo "::error::Secret '$var' is empty or not set."
              ok=false
            fi
          done
          $ok || exit 1
          echo "✓ All signing and notarization secrets are present."

      # ── Pre-flight: validate Apple notarization credentials ───────────────────
      # xcrun notarytool history authenticates against Apple's API using the same
      # credentials the build will use, but without submitting anything.
      # A 401 here means the app-specific password is wrong or expired.
      # Generate a fresh one at https://appleid.apple.com → App-Specific Passwords,
      # then update the APPLE_PASSWORD secret in the repository environment.
      - name: Validate Apple notarization credentials
        env:
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Checking notarization credentials …"
          if ! xcrun notarytool history \
                --apple-id  "$APPLE_ID"       \
                --password  "$APPLE_PASSWORD"  \
                --team-id   "$APPLE_TEAM_ID"   \
                --output-format json 2>&1 | grep -q '"history"'; then
            echo "::error::Apple notarization credentials are invalid."
            echo "::error::Generate a new app-specific password at"
            echo "::error::  https://appleid.apple.com → Sign-In and Security"
            echo "::error::  → App-Specific Passwords → Generate"
            echo "::error::Then update the APPLE_PASSWORD secret in:"
            echo "::error::  GitHub → Settings → Environments → Release → Secrets"
            exit 1
          fi
          echo "✓ Notarization credentials are valid."

      # ── espeak-ng static library ──────────────────────────────────────────────
      # ── Apple Developer certificate → temporary keychain ─────────────────────
      #
      # Secrets required:
      #   APPLE_CERTIFICATE          — base64-encoded .p12 (Developer ID Application cert)
      #   APPLE_CERTIFICATE_PASSWORD — password protecting the .p12
      #
      # How to export the .p12:
      #   Keychain Access → right-click cert → Export → Personal Information Exchange
      #   Then: base64 -i cert.p12 | pbcopy   (paste into the GitHub secret)
      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          # Persist to env so the cleanup step can always find the path.
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"         >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Keep the keychain unlocked for the duration of the job (6 h max).
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the certificate.
          echo -n "$APPLE_CERTIFICATE" \
            | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH"                    \
            -P "$APPLE_CERTIFICATE_PASSWORD"        \
            -T /usr/bin/codesign                    \
            -T /usr/bin/security
          rm -f "$RUNNER_TEMP/cert.p12"

          # Allow codesign to use the key without a password prompt.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make this keychain searchable by codesign / Tauri.
          security list-keychains -d user \
            -s "$KEYCHAIN_PATH" login.keychain

      # ── Compile: frontend + Rust binary + Daemon ─────────────────────────────
      #
      # `npx tauri build` crashes on macOS 26 with SIGILL *after* compilation,
      # inside the Tauri CLI napi binary's bundling code.  The crash occurs
      # regardless of --no-sign, pointing to the icon/resource pipeline (likely
      # SIMD image-processing code that emits ud2 on this CPU).
      #
      # Fix: invoke the two compile steps directly and assemble the .app in the
      # next step, bypassing the Tauri CLI bundler entirely.
      #
      # npm run build  → SvelteKit/Vite frontend (output: build/, embedded by
      #                  generate_context!() when custom-protocol is enabled)
      # cargo build    → Rust binary; build.rs also copies espeak-ng-data into
      #                  src-tauri/resources/ so it is ready for bundling.
      #
      # --features custom-protocol is required: without it Tauri compiles in
      # dev mode and the binary tries to load the UI from localhost:1420
      # instead of serving the embedded SvelteKit build output.  The Tauri
      # CLI (`npx tauri build`) injects this feature automatically, but we
      # bypass the CLI here to avoid its post-compilation SIGILL.
      - name: Compile (frontend + Rust + sidecar)
        shell: bash
        env:
          RUSTC_WRAPPER: sccache
          CMAKE_C_COMPILER_LAUNCHER:   sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: |
          set -euo pipefail
          npm run build
          npm run -s verify:tauri:frontend
          # Build both skill and skill-daemon in a single cargo invocation so
          # feature unification produces one consistent llama-cpp-sys-4 build
          # (with mtmd + metal + q1).  Two separate invocations can cause cargo
          # to reuse a cached llama-cpp-sys-4 static lib that lacks mtmd symbols.
          run_cmd() {
            # Build daemon first — its default features (llm + embed-exg) compile
            # llama-cpp-sys-4 with mtmd+metal+q1 via skill-llm's target-specific deps.
            # Building skill second reuses the cached native libs.
            cargo build -p skill-daemon --release --locked --target aarch64-apple-darwin --timings
            cargo build -p skill --release --locked --target aarch64-apple-darwin --features custom-protocol --timings
            
            # Fix @rpath for skill-daemon immediately after build
            # llama-cpp-4 builds .dylib files by default; we need to embed them
            # in the .app bundle and update the binary's search paths
            DAEMON_BIN="src-tauri/target/aarch64-apple-darwin/release/skill-daemon"
            if [ -f "$DAEMON_BIN" ]; then
              echo "Fixing @rpath for skill-daemon…"
              
              # Create Frameworks directory if it doesn't exist
              mkdir -p "src-tauri/target/aarch64-apple-darwin/release/Frameworks"
              
              # Copy any .dylib files that the daemon depends on
              for LIB in libggml-base.0.dylib libllama.1.dylib; do
                if [ -f "src-tauri/target/aarch64-apple-darwin/release/$LIB" ]; then
                  cp "src-tauri/target/aarch64-apple-darwin/release/$LIB" \
                     "src-tauri/target/aarch64-apple-darwin/release/Frameworks/"
                  install_name_tool -change @rpath/$LIB @executable_path/../Frameworks/$LIB "$DAEMON_BIN"
                fi
              done
            fi
          }
          if ! run_cmd; then
            if [[ -n "${LLAMA_PREBUILT_DIR:-}" ]]; then
              echo "::warning::macOS release compile failed with prebuilt llama; retrying with source build"
              unset LLAMA_PREBUILT_DIR LLAMA_PREBUILT_SHARED
              # Clean stale llama-cpp-sys artifacts so cargo rebuilds from source
              find src-tauri/target -name "*llama_cpp_sys*" -exec rm -rf {} + 2>/dev/null || true
              find src-tauri/target -name "*llama-cpp-sys*" -exec rm -rf {} + 2>/dev/null || true
              run_cmd
            else
              exit 1
            fi
          fi

      # ── Assemble .app bundle ──────────────────────────────────────────────
      #
      # Reproduces what the Tauri bundler would have done:
      #   • Contents/MacOS/skill          — the compiled binary
      #   • Contents/MacOS/skill-daemon   — daemon sidecar binary
      #   • Contents/Resources/icon.icns  — app icon
      #   • Contents/Resources/app/        — built SvelteKit frontend (html/js/css/static)
      #   • Contents/Resources/neutts-samples/   — declared in tauri.conf.json
      #   • Contents/Info.plist           — Tauri CFBundle* keys merged with
      #                                     custom keys from src-tauri/Info.plist
      #
      # neutts-samples  is committed to git → present after checkout.
      # espeak-ng-data  is gitignored       → populated by build.rs above.
      - name: Create .app bundle
        run: |
          APP_NAME="NeuroSkill"
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_BUNDLE="$BUNDLE_DIR/macos/${APP_NAME}.app"

          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"

           # Executable
           cp "src-tauri/target/aarch64-apple-darwin/release/skill" \
             "$APP_BUNDLE/Contents/MacOS/skill"
           chmod +x "$APP_BUNDLE/Contents/MacOS/skill"

           # Sidecar: skill-daemon
           if [ -f "src-tauri/target/aarch64-apple-darwin/release/skill-daemon" ]; then
            cp "src-tauri/target/aarch64-apple-darwin/release/skill-daemon" \
              "$APP_BUNDLE/Contents/MacOS/skill-daemon"
            chmod +x "$APP_BUNDLE/Contents/MacOS/skill-daemon"
            echo "✓ skill-daemon sidecar copied to .app bundle."
           else
            echo "::error::skill-daemon sidecar not found after build."
            exit 1
           fi

          # Icon (CFBundleIconFile references it by stem, without .icns)
          cp "src-tauri/icons/icon.icns" \
             "$APP_BUNDLE/Contents/Resources/icon.icns"

          # Frontend build output (defensive copy for release bundle integrity)
          if [ ! -f "build/index.html" ]; then
            echo "::error::Expected frontend build output missing: build/index.html"
            exit 1
          fi
          rm -rf "$APP_BUNDLE/Contents/Resources/app"
          # Use macOS-native copy semantics for app bundle contents.
          ditto "build" "$APP_BUNDLE/Contents/Resources/app"
          if [ ! -f "$APP_BUNDLE/Contents/Resources/app/index.html" ]; then
            echo "::error::Frontend assets were not copied into app bundle."
            exit 1
          fi
          if [ ! -d "$APP_BUNDLE/Contents/Resources/app/_app/immutable" ]; then
            echo "::error::Missing copied _app/immutable frontend directory in app bundle."
            exit 1
          fi
          JS_COUNT="$(find "$APP_BUNDLE/Contents/Resources/app/_app/immutable" -type f -name "*.js" | wc -l | tr -d ' ')"
          CSS_COUNT="$(find "$APP_BUNDLE/Contents/Resources/app/_app/immutable" -type f -name "*.css" | wc -l | tr -d ' ')"
          if [ "$JS_COUNT" -eq 0 ] || [ "$CSS_COUNT" -eq 0 ]; then
            echo "::error::Copied frontend assets look incomplete (js=$JS_COUNT css=$CSS_COUNT)."
            exit 1
          fi


          # Resources declared in tauri.conf.json (paths relative to src-tauri/)
          cp -R "src-tauri/resources/neutts-samples" \
                "$APP_BUNDLE/Contents/Resources/"

          # Install LaunchDaemon plist for skill-daemon (with correct path)
          # Note: The daemon plist is a template for reference only.
          # At runtime the daemon self-registers as a LaunchAgent via
          # its ServiceInstaller (~/Library/LaunchAgents/), so this
          # bundled plist is not directly loaded by the system.
          DAEMON_PLIST_SRC="src-tauri/resources/com.neuroskill.skill-daemon.plist"
          DAEMON_PLIST_DEST="$APP_BUNDLE/Contents/Resources/com.neuroskill.skill-daemon.plist"
          if [ -f "$DAEMON_PLIST_SRC" ]; then
            cp "$DAEMON_PLIST_SRC" "$DAEMON_PLIST_DEST"
            echo "✓ Daemon plist template bundled."
          fi

          # Info.plist: merge Tauri-required CFBundle* fields with the custom
          # keys already in src-tauri/Info.plist (NSBonjourServices, etc.).
          # Custom keys win when a key exists in both.
          python3 - "$APP_BUNDLE/Contents" "${{ steps.version_meta.outputs.version }}" <<'PYEOF'
          import plistlib, sys, os
          contents, version = sys.argv[1], sys.argv[2]
          with open("src-tauri/Info.plist", "rb") as f:
              custom = plistlib.load(f)
          base = {
              "CFBundleIdentifier":         "com.neuroskill.skill",
              "CFBundleExecutable":         "skill",
              "CFBundleName":               "NeuroSkill",
              "CFBundleDisplayName":        "NeuroSkill",
              "CFBundleVersion":            version,
              "CFBundleShortVersionString": version,
              "CFBundlePackageType":        "APPL",
              "CFBundleSignature":          "????",
              "NSHighResolutionCapable":    True,
              "NSRequiresAquaSystemAppearance": False,
              "LSMinimumSystemVersion":     "11.0",
              "CFBundleIconFile":           "icon",
          }
          merged = {**base, **custom}
          out = os.path.join(contents, "Info.plist")
          with open(out, "wb") as f:
              plistlib.dump(merged, f, fmt=plistlib.FMT_XML)
          print(f"Info.plist written to {out}")
          for k, v in sorted(merged.items()):
              print(f"  {k} = {v!r}")
          PYEOF

          echo "Bundle contents:"
          find "$APP_BUNDLE" -maxdepth 3 | sort

      # ── Sign .app bundle for DMG ────────────────────────────────────────
      - name: Sign .app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_BUNDLE="$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)"
          
          # --deep signs all nested binaries including skill-daemon
          codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            "$APP_BUNDLE"
          echo "✓ Signed .app bundle at $APP_BUNDLE"

      # ── Upload cargo build timings ─────────────────────────────────────────
      # The --timings flag produces an HTML report showing per-crate compile
      # durations.  Upload it so slow crates can be identified and targeted.
      - name: Upload cargo build timings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-macos
          path: src-tauri/target/cargo-timings/
          retention-days: 30

      # ── Create DMG (background, README, CHANGELOG, LICENSE) ────────────────
      #
      # Uses sindresorhus/create-dmg via scripts/create-macos-dmg.sh which:
      #   • Creates DMG with composed icon, Retina background, SLA
      #   • Notarizes with Apple (staples both DMG and .app)
      - name: Install DMG dependencies
        run: |
          npm install --global appdmg
          pip3 install --quiet --break-system-packages Pillow

      - name: Create DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:               ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:         ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:          ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "Creating DMG with version ${{ steps.version_meta.outputs.version }}"
          bash scripts/create-macos-dmg.sh aarch64-apple-darwin
          # Verify the DMG was created with the correct version
          DMG_FILE=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" -maxdepth 1 | head -1)
          if [[ "$DMG_FILE" == *"${{ steps.version_meta.outputs.version }}"* ]]; then
            echo "✓ DMG filename contains correct version: ${{ steps.version_meta.outputs.version }}"
          else
            echo "::error::DMG filename does not contain expected version"
            exit 1
          fi

      # ── Create updater artifact from the signed + stapled .app ─────────────
      #
      # Runs after Create DMG so the .app is already notarized and stapled.
      # The Tauri bundler never ran, so there is no stale .tar.gz to clean up.
      # This step creates the updater bundle from scratch and signs it with the
      # Ed25519 key.  `npx tauri signer sign` is safe here — it is pure
      # cryptography with no macOS-API bundling code, so it does not hit the
      # SIGILL that kills `npx tauri build`.
      - name: Recreate updater artifact from signed .app
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_BUNDLE="$(find "$BUNDLE_DIR/macos" -name "*.app" -maxdepth 1 | head -1)"

          # No stale artifacts to remove (Tauri bundler never ran).
          # Belt-and-suspenders: delete any partial files if this step retries.
          find "$BUNDLE_DIR/macos" \
            \( -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \) -delete

          # Create tarball from the signed + notarized + stapled .app.
          # Use an ASCII-only filename for the tarball so the URL stored in
          # latest.json is a valid RFC 3986 URI; non-ASCII characters such as ™
          # (U+2122) in the filename cause the Tauri updater to produce a 404
          # because its HTTP client rejects or misroutes an un-encoded URL.
          # The .app bundle inside the tar keeps its original NeuroSkill.app name.
          VERSION="${{ steps.version_meta.outputs.version }}"
          TAR_PATH="$BUNDLE_DIR/macos/NeuroSkill_${VERSION}_aarch64.app.tar.gz"
          tar -czf "$TAR_PATH" \
            -C "$(dirname "$APP_BUNDLE")" "$(basename "$APP_BUNDLE")"

          # Sign with Tauri's Ed25519 key.
          # FILE is a positional argument in Tauri v2; -f is now --private-key-path
          # and would conflict with the TAURI_SIGNING_PRIVATE_KEY env var (--private-key).
          npx tauri signer sign "$TAR_PATH"

      # ── Always delete the temporary keychain ──────────────────────────────────
      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # ── Locate build artifacts ────────────────────────────────────────────────
      - name: Collect artifact paths
        id: artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          APP_TAR="$(find "$BUNDLE_DIR/macos" \
                       -name "*.app.tar.gz" ! -name "*.sig" \
                       -maxdepth 1 | head -1)"
          APP_SIG="$(find "$BUNDLE_DIR/macos" \
                       -name "*.app.tar.gz.sig" \
                       -maxdepth 1 | head -1)"
          DMG="$(find "$BUNDLE_DIR/dmg" \
                   -name "*.dmg" \
                   -maxdepth 1 | head -1)"

          if [ -z "$APP_TAR" ] || [ -z "$APP_SIG" ] || [ -z "$DMG" ]; then
            echo "::error::One or more expected artifacts are missing."
            echo "  APP_TAR : $APP_TAR"
            echo "  APP_SIG : $APP_SIG"
            echo "  DMG     : $DMG"
            exit 1
          fi

          echo "app_tar=$APP_TAR"                  >> "$GITHUB_OUTPUT"
          echo "app_sig=$APP_SIG"                  >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG"                          >> "$GITHUB_OUTPUT"
          echo "app_tar_name=$(basename "$APP_TAR")" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$DMG")"         >> "$GITHUB_OUTPUT"

          echo "Artifacts found:"
          echo "  TAR : $APP_TAR  ($(du -sh "$APP_TAR" | cut -f1))"
          echo "  SIG : $APP_SIG"
          echo "  DMG : $DMG  ($(du -sh "$DMG" | cut -f1))"

      # ── Create GitHub Release + upload macOS binary assets ───────────────────
      #
      # Creates (or updates) the release and uploads the macOS-specific binaries.
      # latest.json is handled in the next step so that the Windows and Linux
      # release workflows can each merge their own platform entry without
      # overwriting each other.
      #
      # macOS assets uploaded here:
      #   NeuroSkill_<ver>_aarch64.dmg       — drag-to-install disk image
      #   NeuroSkill.app.tar.gz              — Tauri updater bundle
      #   NeuroSkill.app.tar.gz.sig          — Ed25519 signature for the updater
      - name: Prepare changelog notes for release
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version_meta.outputs.version }}"
          CURRENT_TAG="${{ steps.version_meta.outputs.tag }}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || true)"
          COMMIT_RANGE="$CURRENT_TAG"
          if [ -n "$PREV_TAG" ]; then
            COMMIT_RANGE="$PREV_TAG..$CURRENT_TAG"
          fi

          TMP_SECTION="release-changelog-section.md"
          CONTRIBUTORS_FILE="release-contributors.md"
          RELEASE_BODY="release-notes.md"

          awk -v version="$VERSION" '
            BEGIN { in_section = 0; found = 0 }
            $0 ~ ("^## \\[" version "\\]") { in_section = 1; found = 1; next }
            in_section && $0 ~ /^## \[/ { exit }
            in_section { print }
            END { if (!found) exit 2 }
          ' CHANGELOG.md > "$TMP_SECTION" || true

          git log --format='%aN' $COMMIT_RANGE \
            | awk '
                { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0) }
                NF && !seen[$0]++ { print "- " $0 }
              ' > "$CONTRIBUTORS_FILE"

          {
            echo "## Changelog"
            echo
            if [ -s "$TMP_SECTION" ]; then
              cat "$TMP_SECTION"
            else
              echo "_No changelog section found for version $VERSION in CHANGELOG.md._"
            fi
            echo
            echo "## Contributors"
            echo
            if [ -s "$CONTRIBUTORS_FILE" ]; then
              cat "$CONTRIBUTORS_FILE"
            else
              echo "_No commit contributors found in range $COMMIT_RANGE._"
            fi
          } > "$RELEASE_BODY"

          rm -f "$TMP_SECTION" "$CONTRIBUTORS_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.version_meta.outputs.tag }}
          name:                   Skill v${{ steps.version_meta.outputs.version }}
          generate_release_notes: false
          body_path:              release-notes.md
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.app_tar }}
            ${{ steps.artifacts.outputs.app_sig }}

      # ── Update latest.json ────────────────────────────────────────────────────
      #
      # Downloads the current latest.json from the release (if a Windows or Linux
      # platform workflow already uploaded one), merges the darwin-aarch64 entry,
      # then re-uploads via `gh release upload --clobber`.
      # If no latest.json exists yet this step creates one from scratch.
      #
      # All three platform release workflows (macOS, Windows, Linux) use the same
      # download → merge → upload pattern, so the single file at:
      #   https://github.com/NeuroSkill-com/skill/releases/latest/download/latest.json
      # accumulates entries for every platform as each build completes.
      # The Tauri updater reads only its own platform key (e.g. "darwin-aarch64")
      # and ignores the rest, so a partial manifest is valid while other platform
      # builds are still in flight.
      - name: Update latest.json
        env:
          GH_TOKEN:     ${{ github.token }}
          GH_REPO:      ${{ github.repository }}
          TAG:          ${{ steps.version_meta.outputs.tag }}
          VERSION:      ${{ steps.version_meta.outputs.version }}
          APP_TAR_NAME: ${{ steps.artifacts.outputs.app_tar_name }}
          APP_SIG_PATH: ${{ steps.artifacts.outputs.app_sig }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, datetime

          version      = os.environ["VERSION"]
          tag          = os.environ["TAG"]
          repo         = os.environ["GH_REPO"]
          app_tar_name = os.environ["APP_TAR_NAME"]
          sig_path     = os.environ["APP_SIG_PATH"]

          with open(sig_path) as fh:
              signature = fh.read().strip()

          # Use the git tag annotation as release notes; fall back gracefully.
          try:
              notes = subprocess.check_output(
                  ["git", "tag", "-l", "--format=%(contents)", tag],
                  text=True,
              ).strip()
          except Exception:
              notes = ""
          if not notes:
              notes = f"NeuroSkill\u2122 v{version}"

          download_url = (
              f"https://github.com/{repo}/releases/download/{tag}/{app_tar_name}"
          )

          # Try to download the existing latest.json from the release.
          # Another platform workflow may have already uploaded one.
          dl = subprocess.run(
              ["gh", "release", "download", tag,
               "--pattern", "latest.json", "--output", "latest.json", "--clobber"],
              capture_output=True, text=True,
          )

          if dl.returncode == 0:
              with open("latest.json", encoding="utf-8-sig") as fh:
                  manifest = json.load(fh)
          else:
              pub_date = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
              manifest = {
                  "version":  version,
                  "notes":    notes,
                  "pub_date": pub_date,
                  "platforms": {},
              }

          manifest["platforms"]["darwin-aarch64"] = {
              "url":       download_url,
              "signature": signature,
          }

          with open("latest.json", "w", encoding="utf-8") as fh:
              json.dump(manifest, fh, indent=2, ensure_ascii=False)
              fh.write("\n")

          print("Updated latest.json:")
          print(json.dumps(manifest, indent=2))
          PYEOF

          gh release upload "$TAG" latest.json --clobber
          echo "✓ latest.json uploaded to release $TAG"

      # ── Discord notification ────────────────────────────────────────────────
      - name: Notify Discord of release
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
        run: |
          COMMIT_MSG=$(git log -1 --format='%s' | head -c 200)
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version_meta.outputs.tag }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "$JOB_STATUS" == "success" ]]; then
            COLOR=3066993
            TITLE="🚀 NeuroSkill™ Release v${{ steps.version_meta.outputs.version }} — macOS Published"
            DESC="NeuroSkill™ macOS build published and ready to download."
            LINK_LINE="**[Download v${{ steps.version_meta.outputs.version }}]($RELEASE_URL)**"
          else
            COLOR=15158332
            TITLE="💥 NeuroSkill™ Release v${{ steps.version_meta.outputs.version }} — macOS Failed"
            DESC="The NeuroSkill™ macOS release build failed. Check the run for details."
            LINK_LINE="**[View failed run]($RUN_URL)**"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESC\n\n$LINK_LINE\",
                \"url\": \"$RUN_URL\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Tag\",      \"value\": \"\`${{ steps.version_meta.outputs.tag }}\`\",     \"inline\": true},
                  {\"name\": \"Version\",  \"value\": \"\`${{ steps.version_meta.outputs.version }}\`\", \"inline\": true},
                  {\"name\": \"Platform\", \"value\": \"macOS aarch64\",           \"inline\": true},
                  {\"name\": \"Actor\",    \"value\": \"${{ github.actor }}\",     \"inline\": true},
                  {\"name\": \"Commit Message\", \"value\": $(echo "$COMMIT_MSG" | jq -Rs .), \"inline\": false}
                ],
                \"footer\": {\"text\": \"${{ github.repository }}\"}
              }]
            }"
