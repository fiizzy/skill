name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow manual re-runs from the Actions tab on any branch.
  workflow_dispatch:

jobs:
  # ── Rust backend ─────────────────────────────────────────────────────────────
  rust-check:
    name: Rust — cargo check + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: linux-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          # Bust the cache when the package list changes (workflow file edit).
          key: apt-${{ runner.os }}-tauri-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-${{ runner.os }}-tauri-

      - name: Install Tauri system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev \
            libudev-dev libdbus-1-dev pkg-config \
            libespeak-ng-dev libasound2-dev \
            cmake binutils

      # Vulkan SDK — required by the llm-vulkan feature (llama.cpp Vulkan backend).
      # We install directly from the LunarG apt repo (noble) so cargo check/clippy
      # run against the same feature set used in the release build.
      - name: Install Vulkan SDK
        run: bash scripts/install-vulkan-sdk.sh

      - name: Cache espeak-ng static lib
        id: cache-espeak
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/espeak-static
            src-tauri/resources/espeak-ng-data
          key: linux-x86_64-espeak-${{ hashFiles('scripts/build-espeak-static.sh') }}

      - name: Build espeak-ng static lib
        if: steps.cache-espeak.outputs.cache-hit != 'true'
        run: ESPEAK_ARCHS=x86_64 bash scripts/build-espeak-static.sh

      - name: Update Cargo.lock for Linux
        working-directory: src-tauri
        run: cargo fetch --target x86_64-unknown-linux-gnu

      - name: cargo check
        working-directory: src-tauri
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
        run: cargo check --locked --target x86_64-unknown-linux-gnu --features llm-vulkan

      - name: cargo clippy
        working-directory: src-tauri
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
        run: cargo clippy --locked --target x86_64-unknown-linux-gnu --features llm-vulkan -- -D warnings

  # ── Linux release bundle smoke test ─────────────────────────────────────────
  linux-release:
    name: Linux — release bundle build (deb + AppImage)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Install Tauri Linux release deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev \
            libudev-dev libdbus-1-dev pkg-config \
            libasound2-dev cmake binutils \
            squashfs-tools libfuse2

      # Vulkan SDK — required by llm-vulkan in the release build path.
      - name: Install Vulkan SDK
        run: bash scripts/install-vulkan-sdk.sh

      - name: Cache espeak-ng static lib
        id: cache-espeak
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/espeak-static
            src-tauri/resources/espeak-ng-data
          key: linux-x86_64-espeak-${{ hashFiles('scripts/build-espeak-static.sh') }}

      - name: Build espeak-ng static lib
        if: steps.cache-espeak.outputs.cache-hit != 'true'
        run: ESPEAK_ARCHS=x86_64 bash scripts/build-espeak-static.sh

      - name: Build frontend
        run: npm run build

      # Guard against regressions where the Linux wrapper accidentally injects
      # --no-bundle and skips deb/AppImage outputs.
      - name: Guard Linux bundle flags
        shell: bash
        run: |
          set -euo pipefail

          SCRIPT="$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).scripts['tauri:build:linux:x64']")"
          echo "tauri:build:linux:x64 => $SCRIPT"

          if [[ "$SCRIPT" != *"--bundles deb,appimage"* ]]; then
            echo "::error::package.json script tauri:build:linux:x64 must include '--bundles deb,appimage'."
            exit 1
          fi

          if ! grep -q 'arg === "--bundles"' scripts/tauri-build.js; then
            echo "::error::scripts/tauri-build.js no longer recognizes --bundles as explicit bundling."
            exit 1
          fi

          echo "✓ Linux bundle guard passed."

      # CI release smoke test: validates Linux release bundling path without
      # requiring updater signing secrets.
      - name: Build Tauri release bundles
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        # Uses package.json script so cross-target intent stays explicit:
        # `tauri:build:linux:x64` sets ALLOW_LINUX_CROSS=1.
        run: npm run tauri:build:linux:x64

      - name: Verify Linux bundle directories
        shell: bash
        run: |
          set -euo pipefail
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"

          if [ ! -d "$TARGET_DIR/deb" ] || [ ! -d "$TARGET_DIR/appimage" ]; then
            echo "::error::Expected Linux bundle directories are missing."
            echo "Expected: $TARGET_DIR/deb and $TARGET_DIR/appimage"
            echo "Present under $TARGET_DIR:"
            find "$TARGET_DIR" -maxdepth 2 -type d 2>/dev/null | sort || true
            exit 1
          fi

          echo "✓ Bundle directories exist: $TARGET_DIR/deb and $TARGET_DIR/appimage"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend — check + i18n + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run i18n sync first — it's cheap and catches missing translation keys
      # before the slower svelte-check.
      - name: i18n sync check
        run: npm run sync:i18n:check

      - name: svelte-check
        run: npm run check

      - name: Unit tests
        run: npm test

  # ── Windows Rust backend ─────────────────────────────────────────────────────
  windows-check:
    name: Windows — cargo check + clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Puts cl.exe, link.exe, lib.exe, and signtool.exe in PATH.
      # Required for the espeak-ng static library build (lib.exe) and for
      # the Vulkan SDK CMake integration used by the llm-vulkan feature.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      # Git for Windows ships a Unix hard-link utility at
      # C:\Program Files\Git\usr\bin\link.exe which $GITHUB_PATH prepends
      # at every step, silently shadowing MSVC's linker.  Deleting it is the
      # only reliable fix (PATH-filtering is undone each step).
      - name: Remove Git's link.exe (shadows MSVC linker)
        shell: powershell
        run: |
          $gitLink = "C:\Program Files\Git\usr\bin\link.exe"
          if (Test-Path $gitLink) {
            Remove-Item $gitLink -Force
            Write-Host "[ok] Deleted $gitLink"
          } else {
            Write-Host "[skip] $gitLink not found - nothing to remove"
          }

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Swatinem/rust-cache is used here (matching the release workflow) for
      # smarter per-crate invalidation vs the manual actions/cache approach.
      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      # Catch PowerShell encoding bugs (e.g. UTF-8 multi-byte sequences that
      # Windows-1252-reading PS5.1 misinterprets as string delimiters) before
      # they break the build.  Uses the PS parser directly — no execution needed.
      - name: Validate PowerShell scripts (syntax check)
        shell: powershell
        run: |
          $failed = $false
          Get-ChildItem scripts\*.ps1 | ForEach-Object {
            $parseErrors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$null, [ref]$parseErrors
            )
            if ($parseErrors.Count -gt 0) {
              Write-Host "::error file=$($_.Name)::$($parseErrors.Count) parse error(s):"
              $parseErrors | ForEach-Object { Write-Host "  $_" }
              $failed = $true
            } else {
              Write-Host "[ok] $($_.Name)"
            }
          }
          if ($failed) { exit 1 }
          Write-Host "[ok] All PowerShell scripts parse cleanly."

      - name: Cache espeak-ng static lib
        id: cache-espeak
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/espeak-static
            src-tauri/resources/espeak-ng-data
          key: windows-x86_64-espeak-${{ hashFiles('scripts/build-espeak-static.ps1') }}

      - name: Build espeak-ng static lib
        if: steps.cache-espeak.outputs.cache-hit != 'true'
        shell: powershell
        run: .\scripts\build-espeak-static.ps1

      # Cache the Vulkan SDK installation directory so the ~200 MB download
      # only happens once per change to the install script.  On cache hit the
      # install script detects the SDK via filesystem and skips the download.
      - name: Cache Vulkan SDK
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK
          key: windows-vulkan-sdk-${{ hashFiles('scripts/install-vulkan-sdk.ps1') }}

      # Run install script (no-op on cache hit) then propagate the SDK path
      # to subsequent steps via GITHUB_ENV.  Without this, cargo/cmake can't
      # find the Vulkan headers when the SDK was restored from cache rather
      # than freshly installed (the machine-level env var isn't in the cache).
      - name: Install Vulkan SDK + export VULKAN_SDK
        shell: powershell
        run: |
          .\scripts\install-vulkan-sdk.ps1
          if (-not $env:VULKAN_SDK) {
            Write-Error "VULKAN_SDK was not set by install-vulkan-sdk.ps1"
            exit 1
          }
          "VULKAN_SDK=$env:VULKAN_SDK" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[ok] Exported VULKAN_SDK=$env:VULKAN_SDK"

      # ── Standalone LLVM 19 for bindgen ──────────────────────────────────────
      # VS2022's bundled Clang 19 is an MSVC-compat build (clang-cl) whose
      # mmintrin.h references __builtin_ia32_* GCC-style intrinsics that
      # clang-cl doesn't implement, causing bindgen (llama-cpp-sys-4) to panic
      # with ~20 "use of undeclared identifier '__builtin_ia32_…'" errors.
      #
      # Fix: standalone LLVM 19 (non-MSVC-compat) implements all those builtins
      # AND its headers match the same version VS2022 ships, so there is no
      # version mismatch.  KyleMayes/install-llvm-action downloads directly
      # from the LLVM GitHub releases (no Chocolatey dependency), has its own
      # built-in cache keyed on the version string, and installs to C:\LLVM
      # (a path without spaces, which avoids quoting issues in env vars).
      #
      # clang-sys checks LIBCLANG_PATH before PATH, so the explicit export
      # below guarantees bindgen finds standalone LLVM's libclang.dll even
      # when ilammy/msvc-dev-cmd has already put VS's clang-cl on PATH.
      - name: Install LLVM 19
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "19"
          directory: C:\LLVM

      - name: Export LIBCLANG_PATH
        shell: powershell
        run: |
          # KyleMayes/install-llvm-action sets LLVM_PATH to the install root.
          # libclang.dll lives in the bin/ subdirectory for Windows builds
          # downloaded from LLVM GitHub releases.
          $dll = Get-ChildItem "C:\LLVM" -Recurse -Filter "libclang.dll" `
                   -ErrorAction SilentlyContinue |
                   Select-Object -First 1
          if (-not $dll) {
            Write-Error "libclang.dll not found under C:\LLVM"
            exit 1
          }
          $dir = Split-Path $dll.FullName
          "LIBCLANG_PATH=$dir" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[ok] LIBCLANG_PATH=$dir  (libclang.dll at $($dll.FullName))"
          
          # Also set LLVM_CONFIG to help with toolchain detection
          "LLVM_CONFIG=C:\LLVM\bin\llvm-config.exe" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[ok] LLVM_CONFIG=C:\LLVM\bin\llvm-config.exe"
          
          # Set additional environment to bypass issues in clang-cl with mmx intrinsics
          "CC=C:\LLVM\bin\clang.exe" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[ok] CC=C:\LLVM\bin\clang.exe"
          
          "CXX=C:\LLVM\bin\clang++.exe" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "[ok] CXX=C:\LLVM\bin\clang++.exe"

      # llm-vulkan is always injected on Windows (see scripts/tauri-build.js).
      # Check with the same feature set the actual build uses so compilation
      # errors aren't silently skipped.
      # VULKAN_SDK is forwarded explicitly: the step-level `env:` block merges
      # with the inherited environment in most shells, but Git Bash on Windows
      # can drop GITHUB_ENV vars that aren't re-declared, so we list it here
      # to be safe.
      - name: cargo check
        shell: bash
        working-directory: src-tauri
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
          VULKAN_SDK:    ${{ env.VULKAN_SDK }}
          LLVM_CONFIG:   ${{ env.LLVM_CONFIG }}
          CC:            ${{ env.CC }}
          CXX:           ${{ env.CXX }}
        run: cargo check --target x86_64-pc-windows-msvc --features llm-vulkan

      - name: cargo clippy
        shell: bash
        working-directory: src-tauri
        env:
          ESPEAK_LIB_DIR: ${{ github.workspace }}/src-tauri/espeak-static/lib
          LIBCLANG_PATH: ${{ env.LIBCLANG_PATH }}
          VULKAN_SDK:    ${{ env.VULKAN_SDK }}
          LLVM_CONFIG:   ${{ env.LLVM_CONFIG }}
          CC:            ${{ env.CC }}
          CXX:           ${{ env.CXX }}
        run: >
          cargo clippy
          --target x86_64-pc-windows-msvc
          --features llm-vulkan
          -- -D warnings

  # ── Security audit ────────────────────────────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (audit)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-audit
          # cargo-audit's own deps change with Cargo.lock; bin is also covered.
          key: linux-cargo-audit-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: linux-cargo-audit-

      - name: cargo audit
        working-directory: src-tauri
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit
        continue-on-error: true

  # ── Discord notification ──────────────────────────────────────────────────
  notify:
    name: Discord notification
    runs-on: ubuntu-latest
    needs: [rust-check, linux-release, windows-check, frontend-check, audit]
    if: always()
    steps:
      - name: Send CI result to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUST="${{ needs.rust-check.result }}"
          LINUX_RELEASE="${{ needs.linux-release.result }}"
          WINDOWS="${{ needs.windows-check.result }}"
          FRONTEND="${{ needs.frontend-check.result }}"
          AUDIT="${{ needs.audit.result }}"

          # Determine overall status — Windows is a required gate alongside
          # Rust (Linux), Linux release bundle build, and Frontend;
          # audit is advisory only.
          if [[ "$RUST" == "success" && "$LINUX_RELEASE" == "success" && "$WINDOWS" == "success" && "$FRONTEND" == "success" ]]; then
            COLOR=3066993   # green
            STATUS="✅ Passed"
          else
            COLOR=15158332  # red
            STATUS="❌ Failed"
          fi

          EMOJI_RUST=$([ "$RUST" = "success" ] && echo "✅" || echo "❌")
          EMOJI_LINUX_RELEASE=$([ "$LINUX_RELEASE" = "success" ] && echo "✅" || echo "❌")
          EMOJI_WINDOWS=$([ "$WINDOWS" = "success" ] && echo "✅" || echo "❌")
          EMOJI_FRONTEND=$([ "$FRONTEND" = "success" ] && echo "✅" || echo "❌")
          EMOJI_AUDIT=$([ "$AUDIT" = "success" ] && echo "✅" || echo "⚠️")

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REF="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"
          EVENT="${{ github.event_name }}"

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"CI — $STATUS\",
                \"url\": \"$RUN_URL\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Branch\",    \"value\": \"\`$REF\`\",          \"inline\": true},
                  {\"name\": \"Commit\",    \"value\": \"\`${SHA:0:8}\`\",    \"inline\": true},
                  {\"name\": \"Triggered\", \"value\": \"$EVENT by $ACTOR\", \"inline\": true},
                  {\"name\": \"Rust (Linux+Vulkan)\", \"value\": \"$EMOJI_RUST $RUST\",   \"inline\": true},
                  {\"name\": \"Linux Release Bundles\", \"value\": \"$EMOJI_LINUX_RELEASE $LINUX_RELEASE\", \"inline\": true},
                  {\"name\": \"Rust (Windows)\", \"value\": \"$EMOJI_WINDOWS $WINDOWS\", \"inline\": true},
                  {\"name\": \"Frontend\",       \"value\": \"$EMOJI_FRONTEND $FRONTEND\", \"inline\": true},
                  {\"name\": \"Audit\",          \"value\": \"$EMOJI_AUDIT $AUDIT\",       \"inline\": true}
                ],
                \"footer\": {\"text\": \"${{ github.repository }}\"}
              }]
            }"
