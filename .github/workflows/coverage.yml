name: Coverage

on:
  workflow_dispatch:
    inputs:
      coverage_min_lines:
        description: 'Minimum line coverage percentage gate'
        required: false
        default: '40'
  push:
    branches: [ main ]
    paths:
      - 'crates/**'
      - '.github/workflows/coverage.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  rust-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Repo-wide .cargo/config.toml enables sccache, but this workflow does not
      # set it up. Disable wrapper here to avoid "sccache ... No such file".
      RUSTC_WRAPPER: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch skills submodule
        run: git submodule update --init --depth=1 skills

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> src-tauri/target"
          shared-key: linux-ci-x86_64-unknown-linux-gnu-v1
          cache-targets: false
          cache-on-failure: false

      - name: Cache + install Tauri system deps (incl. mold + clang)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev libappindicator3-dev
            librsvg2-dev patchelf libssl-dev
            libudev-dev libdbus-1-dev pkg-config
            libespeak-ng-dev libasound2-dev
            libpipewire-0.3-dev libgbm-dev
            cmake binutils mold clang
            protobuf-compiler libopenblas-dev
          version: tauri-rust-check-v5

      - name: Setup Vulkan SDK
        uses: ./.github/actions/setup-vulkan-linux

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage (lcov + threshold)
        env:
          COVERAGE_MIN_LINES: ${{ github.event.inputs.coverage_min_lines || '55' }}
        run: |
          cargo llvm-cov clean --workspace
          # Use default feature sets in CI coverage.
          # `--all-features` enables CUDA-only paths (llm-cuda) that fail on
          # GitHub-hosted Linux runners without the CUDA toolkit.
          # Exclude e2e / integration-test crates that require network or
          # long-running services (iroh relay, LLM model, LSL streams).
          # These are tested separately via manual CI dispatch.
          # Use cpu-only mode to avoid GPU dependencies (cubecl-runtime) that
          # are unavailable in GitHub Actions runners.
          cargo llvm-cov \
            --workspace \
            --exclude iroh_test_client \
            --exclude iroh-example-client \
            --exclude skill \
            --no-default-features \
            --features llm-native,skill-router/cpu,skill-daemon/cpu-only \
            --lcov \
            --output-path lcov.info

          cargo llvm-cov \
            --workspace \
            --exclude iroh_test_client \
            --exclude iroh-example-client \
            --exclude skill \
            --no-default-features \
            --features llm-native,skill-router/cpu,skill-daemon/cpu-only \
            --summary-only \
            --fail-under-lines ${COVERAGE_MIN_LINES}

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-lcov
          path: lcov.info
