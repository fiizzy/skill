  </defs>
  <!-- Outer ring body -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="url(#oura-grad)" stroke-width="14" />
  <!-- Inner highlight -->
  <circle cx="64" cy="64" r="52" fill="none" stroke="#a1a1aa" stroke-width="2" opacity="0.3" />
  <!-- Sensor dots (green LEDs) -->
  <circle cx="48" cy="112" r="3" fill="#22c55e" opacity="0.8" />
  <circle cx="64" cy="115" r="3" fill="#22c55e" opacity="0.8" />
  <circle cx="80" cy="112" r="3" fill="#22c55e" opacity="0.8" />
